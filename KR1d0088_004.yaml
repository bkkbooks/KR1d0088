body:
  text: 書儀卷四宋司馬光撰婚儀下婦見舅姑婦明日夙興盛服飾俟見舅姑執事者設盥盆於堂阼階下帨架在北兄弟姊妹立於盆東如冠禮男女異列男在西女在東皆北上平明舅姑坐于堂上東西相向各置卓子于前贊者見婦于舅姑婦北靣拜舅于堂下古者拜于堂上今恭也可從衆執笲古笲制度漢世已不能知今但取小箱以帛衣之皂表緋裏以代笲可也實以棗栗升自西階進至舅前北向奠于卓子上舅撫之侍者徹去婦降又拜舅畢乃拜姑别受笲實以腶修腶修今之暴脯是也升進至姑前北向奠於卓子上姑舉之以授侍者婦降又别執事者設席於姑之北南向設酒壺及注杯卓子于堂上婦升立於席西南靣贊者醴婦如父母醮女之儀婦降西階就兄弟姊妹之前其長屬應受拜者少進立婦乃拜之無贄拜畢長屬退長屬雖多共為一列受拜以從簡易幼屬應相拜者今世俗小郎小姑皆相拜少進相拜畢退無贄若有尊屬則婦往拜于其室有卑屬則來拜于婦室婦退休於其室至食時行盥饋之禮婦家具盛饌酒壺士婚禮婦盥饋特豚合升側載注側載者右胖載之舅爼在胖載之姑爼今恐貧者不便殺牲故但具盛饌而已婦從者設蔬果卓子于堂上舅姑之前設盥盆於阼階東南帨架在東婦盥于阼階下執饌自西階升几子婦升降皆應自西階惟冢婦受享畢降自阼階薦于舅姑侍立于姑之後饌有繼至者侍者傳致于西階不盡一級婦往受之薦于舅姑侍者徹餘饌置于旁側别室舅姑侍者各置一卓子上食畢婦降拜舅升洗杯斟酒置舅卓子上降俟舅舉酒飲畢又拜遂獻姑姑受而飲之餘如獻舅之儀婦升徹飯侍者徹其餘皆置别室婦就餕姑之饌畢婦從者餕舅之餘壻從者餕婦之餘舅姑共饗婦于堂上設席如朝來禮婦之位婦升立于席西南向贊者取杯斟酒授婦皆如朝來禮婦之儀舅姑先降自西階婦降自阼階此謂冢婦也餘婦則舅姑不降婦降自西階古者庶婦不饋然饋主供養雖庶婦不可闕也若舅姑已沒則古有三月廟見之禮今已拜先靈更不行若舅姑止一人則舅坐于東序姑坐于西序席婦于姑坐之北壻見婦之父母明日壻往見婦之父母皆有幣婦父迎送揖讓皆如客禮拜即跪而扶之入見婦母婦母闔門左扉立於門內壻拜于門外次見妻黨諸親拜起皆如俗儀而無幣見諸婦女如見婦母之禮婦家設酒饌壻如常儀親迎之夕不當見婦母及諸親亦不當行私禮設酒饌以婦未見舅姑故也居家雜儀凡為家長必謹守禮法以御羣子弟及家衆分之以職謂使之掌倉廪廏庫庖厨之類授之以事謂朝夕所幹及非常之事而責其成功制財用之節量入以為出稱家之有無以給上下之衣食及吉凶之費皆有品節而莫不均一裁省冗費禁止奢華常須稍存贏餘以備不虞凡諸卑幼事無大小毋得専行必咨稟於家長易曰家人有嚴君焉父母之謂也安有嚴君在上而其下敢直行自恣不顧者乎雖非父母當時為家長者亦當咨稟而行之則號令出于一人家政始可得而治矣凡為子婦者毋得畜私財俸祿及田宅所入盡歸之父母舅姑當用則請而用之不敢私假不敢私與內則曰子婦無私貨無私畜無私器不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茞蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏之以待乏鄭康成曰待舅姑之乏也不得命者不見許也又曰婦若有私親兄弟將與之則必復請其故賜而後與之夫人子之身父母之身也身且不敢自有况敢有私財乎若父子異財互相假借則是有子富而父母貧者父母飢而子飽者賈誼所謂借父耰鉏慮有德色母取箕帚立而誶語不孝不義孰大于此茞昌改切耰音憂誶音碎凡父母有過下氣怡色柔聲以諫諫若不入起敬起孝説則復諫不説與其得罪于鄉黨州閭寧熟諫父母怒不説而撻之流血不敢疾怨起敬起孝凡為人子弟者不敢以富貴加于父兄宗族加謂恃其富貴不率卑幼之禮凡為人子者出必告反必靣有賔客不敢坐于正廳無書院則坐于廳之旁側升降不敢由東階上下馬不敢當廳凡事不敢自擬於其父凡父母舅姑有疾子婦無故不離側親調嘗藥餌而供之父母有疾子色不滿容不戲笑不宴遊捨置餘事専以迎醫顔氏家訓曰父母在疾子拜醫以求藥蓋以醫者親之存亡所繫豈可傲忽也檢方合藥為務疾已復初凡子事父母父母所愛亦當愛之所敬亦當敬之至于犬馬盡然而況于人乎凡子事父母樂其心不違其志樂其耳目安其寢處以其飲食奉養之幼事長賤事貴皆倣此也凡子婦未敬未孝不可遽有憎疾姑教之若不可教然後怒之若不可怒然後笞之屢笞而終不改子放婦出然亦不明言其犯禮也子甚宜其妻父母不悅出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰凡為宫室必辨內外深宫固門內外不共井不共浴堂不共厠男治外事女治內事男子晝無故不處私室婦人無故不窺中門有故出中門必擁蔽其靣如蓋頭面帽之類男子夜行以燭男僕非有繕修及有大故大故謂水火盜賊之類亦必以袖遮其靣女僕無故不出中門蓋小婢亦然有故出中門亦必擁蔽其靣鈴下蒼頭但主通內外之言傳致內外之物毋得輒升堂室入庖厨凡卑幼坐而尊長過之則起出遇尊長于塗則下馬不見尊長經再宿以上則再拜五宿以上則四拜賀冬至正旦六拜朔望四拜凡拜數或尊長臨時減而止之則從尊長之命吾家同居宗族衆多冬正朔望宗族聚于堂上此假設南靣之堂若宅舍異制臨時從宜丈夫處左西上婦人處右東上左右謂家長之左右皆北向共為一列各以長幼為序婦以夫之長幼為序不以身之長幼共拜家長畢長兄立于門之左長姊立于門之右皆南向諸弟妹以次拜訖各就列丈夫西上婦人東上共受卑幼拜以宗族多若人人致拜則不勝煩勞故同列共受之受拜訖先退後輩立受拜于門東西如前輩之儀若卑幼自逺方至見尊長遇尊長三人以上同處者先共再拜敘寒暄問起居訖又三再拜而止晨夜唱喏萬福安置若尊長三人以上同處亦三而止皆所以避煩也凡受女壻及外甥拜立而扶扶謂搊䇿外孫則立而受之可也凡節序及非時家晏上壽于家長卑幼盛服序立如朔望之儀先再拜子弟之最長者一人進立于家長之前幼者一人搢笏執酒盞立于其左一人搢笏執酒注立于其右長者搢笏跪斟酒祝曰伏願某官備膺五福保族宜家授幼者盞注返其故處長者出笏俯伏興退與卑幼皆再拜家長命諸卑幼坐皆再拜而坐家長命侍者遍酢諸卑幼諸卑幼皆起敘立如前俱再拜就坐飲訖家長命易服皆退易便服還復就坐凡子始生若為之求乳母必擇良家婦人稍溫謹者乳母不良非惟敗亂家法兼令所飼之子性行亦類之子能食飼之教以右手子能言教之自名及唱喏萬福安置稍有知則教之以恭敬尊長有不識尊卑長幼者則嚴訶禁之古有胎教况于已生子始生未有知固舉以禮況于已有知孔子曰幼成若天性習慣如自然顔氏家訓曰教婦初來教子嬰孩故慎在其始此其理也若夫子之幼也使之不知尊卑長幼之禮每致侮詈父母驅擊兄姊父母不加訶禁反笑而奬之彼既未辨好惡謂禮當然及其既長習已成性乃怒而禁之不可復制于是父疾其子子怨其父殘忍悖逆無所不至此蓋父母無深識逺慮不能防微杜漸溺于小慈養成其惡故也六嵗教之數謂一十百千萬與方名謂東西南北男子始習書字女子始習女工之小者七嵗男女不同席不共食始誦孝經論語雖女子亦宜誦之自七嵗以下謂之孺子早寢晏起食無時八嵗出入門户及即席飲食必後長者始教之以謙讓男子誦尚書女子不出中門九嵗男子讀春秋及諸史始為之講解使曉義理女子亦為之講解論語孝經及列女傳女戒之類略曉大意古之賢女無不觀圖史以自鑒如曹大家之徒皆精通經術論議明正今人或教女子以作歌詩執俗樂殊非所宜也十嵗男子出就外傅居宿于外讀詩禮傳為之講解使知仁義禮智信自是以往可以讀孟荀揚子博觀羣書凡所讀書必擇其精要者而誦之如禮記學記大學中庸樂記之類他書倣此其異端非聖賢之書傳宜禁之勿使妄觀以惑亂其志觀書皆通始可學文辭女子則教以婉娩聽從婉娩柔順貌娩音晚及女工之大者女工謂蠶桑織績裁縫及為飲膳不惟正是婦人之職兼欲使之知衣食所來之艱雞不敢恣為奢麗至于纂組華巧之物亦不必習也未冠笄者質明而起總角貴音悔洗靣靣也靣以見尊長佐長者供養祭祀則佐執酒食若既冠笄則皆責以成人之禮不得復言童幼矣凡內外僕妾雞初鳴咸起櫛總盥漱衣服男僕灑掃廳事及庭鈴下蒼頭灑掃中庭女僕灑掃堂室設倚卓陳盥漱櫛靧之具主父主母既起則拂床襞衾襞音壁疊衣也侍立左右以備使令退而具飲食得間則浣濯紐縫先公後私及夜則復拂床展衾當晝內外僕妾惟主人之命各從其事以供百役凡女僕同輩謂兄弟所使謂長者為姊後輩謂諸子舍所使謂前輩為姨內則雖婢妾衣服飲食必後長者鄭康成曰人貴賤不可以無禮故使之序長幼務相雍睦其有鬬爭者主父主母聞之即訶禁之訶禁之不止即杖之理曲者杖多一止一不止獨杖不止者凡男僕有忠信可任者重其祿能幹家事次之其専務欺詐背公徇私屢為盜竊弄權犯上者逐之凡女僕年滿不願留者縱之勤舊少過者資而嫁之其兩靣二舌構虛造讒離間骨肉者逐之屢為盜竊者逐之放蕩不謹者逐之有離叛之志者逐之書儀卷四
