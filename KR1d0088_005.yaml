body:
  text: 書儀卷五宋司馬光撰喪儀一初終病甚附疾病謂疾甚時也遷居正寢內外安靜以俟氣絶喧譁奔走固病者所惡也悲哀哭泣傷病者心叫呼撼捽尤為不可使病者驚怛搖頓而死皆未免為不終天年故不若安恬靜默以待其氣息自盡為最善也男子不絶於婦人之手婦人不絶於男子之手春秋書公薧于路寢禮之正也士喪禮死于適室注正寢之室也曽子且死猶易簀曰吾得正而斃焉斯可矣近世孫宣公臨薨遷於外寢蓋君子慎終不得不爾也凡男子疾病婦人侍疾者雖至親當處數步之外婦人疾病男子亦然此所謂能以禮自終也既絶諸子啼兄弟親戚侍者皆哭各盡哀止哭開元禮於此下即言男女易服布素及坐哭之位按喪大記惟哭先復復然後行死事復者返也孝子之心猶冀其復生也又布素之服非始死所有今並繫之復後復立喪主護喪等附侍者一人以死者之上服按雜記喪大記復衣諸侯以衮夫人以揄狄內子以鞠衣今從開元禮上服者有官則公服無官則襴衫或衫婦人以大袖或背子皆常經衣者左執領右執腰就寢庭之南北靣招以衣呼曰某人復喪大記曰凡復者男子稱名婦人稱字今但稱官封或依常時所稱可也凡三呼畢卷衣入復于尸上復者招魂復魄也檀弓曰復盡愛之道有禱祠之心焉望反諸幽求諸鬼神之道也北靣求諸幽之義也士喪禮復者一人以爵辨服簪裳于衣左何之扱領于帶升自前東榮中屋北靣招以衣曰臯某復三降衣于前受用篋升自阼階以衣尸復者降自後西榮簪連也臯長聲也降衣下之也受者受之於庭也衣尸者復之若得魂返之也降因徹西北扉開元禮亦倣此今升屋而號慮其驚衆故但就寢庭之南靣而已然後行死事立喪主凡主人當以長子為之無長子則長孫承重奔喪曰凡喪父在父為主注與賓客為禮宜使尊者又曰父沒兄弟同居各主其喪注各為妻子之喪為主也又曰親同長者主之鄭康成曰昆弟之喪宗子主之又曰不同親者主之注從父昆弟之喪也雜記曰姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之伯髙死于衛赴於孔子孔子曰夫由賜也見我哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之喪大記曰喪有無後無無主若子孫有喪而祖父主之子孫執喪祖父拜賓主婦孔頴逹檀弓啜主人主婦正義曰主人亡者之子主婦亡者之妻若亡者無妻及母之喪則以主人之妻為主婦護喪以家長或子孫能幹事知禮者一人為之凡喪事皆禀焉若主人未成服不出則代主人受弔拜賓及受賻襚古禮初喪主人常在尸側惟君命出出而遇賓則拜司書以子弟或吏人能書札者為之掌糾書疏之事司貨以子弟或吏僕可委信者為之掌糾貨賄之事置冊以謹其出入親賓有賻禭則書於别冊收之以待喪用其衣服不以襲斂易服既復妻子婦妾皆去冠及上服上服謂衫帶背子之類被髮男子扱上衽謂插衣前襟之類徒跣婦人不徒跣男子為人後者為本生父母及女子已嫁者皆不被髮徒跣但去冠及上服凡齊衰以下內外有服親及在喪側給事者皆釋去華盛之服謂錦繡緋紅金玉珠翠之類著素淡之衣問喪親始死笄纚徒跣扱上衽注親始死去冠二日先去笄纚括髮也上袵深衣之裳前開元禮初終男子易以白布衣披髮徒跣婦人易以青縑衣披髮不徒跣為人後者為本生父母素冠不徒跣女子已嫁者髽齊衰以下丈夫素冠婦人去首飾內外皆素服按笄纚今人平日所不服被髮尤哀毁無容故從開元禮然白布青縑衣素冠素服皆非始死所能辦故但釋去華盛之服本應三年喪者則去冠及上服期喪以下士大夫帽子皂衫青黃勒帛庶人不改常服禮男子括髮婦人多髽故於始死時期喪以下但去首飾易華盛之服而已世俗多忌諱或為父則被左髮母則被右髮舅則被後左姑則被後右皆非禮宜全被之訃告訃音赴護喪司書為之發書訃告於親戚及僚友檀弓曰父兄命赴者然則主人不自赴也若無護喪及司書則主人自赴親戚不赴僚友劉嶽書儀卒哭然後發外人書疏蓋以哀痛方深不暇與人通問故也然問候慶賀之書居喪誠不當發必若有事不獲已須至有聞於人者雖未卒哭豈可以不發也沐浴飯含襲始死之奠哭泣附將沐浴則以帷障卧內侍者設牀於尸所卧牀前縱置之施簀席簟枕不施氊褥古者疾病廢牀人生在地去牀庶其生氣反也將沐浴則復遷尸於牀矣故喪大記曰始死遷尸於牀幠用斂衾去死衣或遇暑月則君設大槃大夫設夷槃實以冰士無冰則併瓦槃實以水置於牀下以寒尸今人既死乃卧尸於地訛也古者沐浴及飯含皆在牖下今室堂與古異制故於所卧牀前置之以從宜也古者沐浴設牀袒簀袒簀者去席蓋水便也今籍以簟不設氊褥亦於沐浴便遷尸於牀上南首覆之以衾禮運曰死者北首謂葬時也自沐浴至殯古亦南首惟朝廟北首侍者握坎於屏處潔地士喪禮甸人掘坎于階間少西今以孝子之心不忍朝夕見親爪髮及沐浴之具故掘坎於屏處陳襲衣裳於堂前東北藉以席西領南上幅巾一古者死人不冠但以帛裹其首謂之掩士喪禮掩練帛廣終幅長五尺析其末注掩裹首也析其末謂將結於頤下又還結於項中蓋以襲斂主于保護肌體貴於柔軟緊實冠則磊塊難安況今幞頭以鐵為腳長三尺而帽用漆紗為之上有虛簷置於棺中何由安帖莫若襲以常服上加幅巾深衣大帶及屐既合於古又便於事幅巾所以代掩也其制如今之暖帽深衣帶屐自有制度若無深衣帶屐止用衫勒帛鞋亦得其幞頭公服腰帶靴笏俟葬時置於棺上可也充耳二用白礦以綿為之如棗核大用塞耳中幎目一用帛方尺二寸所以覆靣者也握手用帛長尺二寸廣五寸所以裹手者也深衣大帶屐若襚衣有餘則繼陳而不用謂親戚以衣服來襚者繼陳於襲衣之下而不用以襲也多陳之為榮少納之為貴又陳飯含沐浴之具於堂前西壁下南上錢三實于小箱檀弓曰古者飯用米貝弗忍虛也飯用貝今用錢猶古用貝也古禮諸侯飯七貝大夫五士三大夫以上仍有珠玉錢多既不足貴又口所不容珠玉則更為盜賊之招故但用三錢而已米二升實於碗古者諸侯飯用粱大夫用稷士用稻今但用鄉土所生平日所食之米可也古升小故用四升今升大故用二升沐巾一浴巾二設於䈂浴巾二上下體各異也櫛置於卓子上侍者汲新水淅米令精復實於碗侍者以沐浴湯入主人以下皆出立於帷外北靣以其裸裎子孫不可在側故也侍者沐髮櫛之晞之以巾撮為髻舉衾而浴亦為其裸裎故舉衾以障之拭之以二巾翦爪如平時其沐浴餘衣及巾櫛皆棄於坎遂築而實之侍者别設襲牀施薦席氊褥枕如平時先置大帶深衣袍襖汗衫袴襪勒帛裏肚之類於其上遂舉以入置浴牀之西遷尸於其上悉去病時衣及復衣易以新衣但未著幅巾深衣屐移置堂中間鄭注喪大記曰正尸謂遷尸於牖下南首也今室堂既異於古故置堂中間取其容男女夾牀哭位也卑幼則各於其室中間自餘應在堂者並倣此執事者置脯醢酒於卓曽子問始死之奠其餘閣也歟注不容改新也古人常畜脯醢故始死未暇别具饌但用脯醢而已今人或無脯醢但中見有食物一兩種并酒可也凡奠除酒器之外盡用素器不用金銀稜裹之物以生人有哀素之心故也升自阼階祝盥手洗盞斟酒奠於尸東當腢巾之腢肩頭也士喪禮復者降楔齒綴足即奠脯醢醴酒於尸東鄭注鬼神無象設奠以憑依之開元禮五品以上如士喪禮六品以下含而後奠今不以官品髙下沐浴正尸然後設奠於事為宜奠謂斟酒奉至卓上而不酹也主人虞祭然後親奠酹巾者以辟塵繩凡無兩階者止以階之東偏為阼階西偏為西階祝選親戚為之主人坐於牀東奠北衆男應服三年者坐其下皆西向南上藉以稿同姓男子應服期者坐其後大功以下又以次坐其後皆西向南上尊行坐於北壁下南向西上藉以席薦各以服重輕昭穆長幼為叙主婦及衆婦女坐于牀西藉以稿同姓女子應服期以下坐於其後尊行坐於牀西北壁下南向東上藉以席薦亦各以服重輕昭穆長幼為叙如男子之儀妾婢立於婦女之後婦以夫之長幼為叙不以身之長幼異姓之親丈夫坐於帷外之東北向西上此非沐浴之幃謂設帷於堂裏所以别內外者也婦人坐於帷內之西北向東上皆藉以席有服者在前無服者在後各以尊卑長幼為叙若內喪謂婦人之喪則同姓丈夫尊卑坐於帷外之東北向西上異姓丈夫坐於帷外之西北向東上士喪禮主人入坐於牀東衆主人在其後西面婦人俠牀東面鄭注衆主人庶昆弟也婦人謂妻妾子姓也亦嫡妻在前又曰親者在室注謂大功以上父兄姑姊子姪在此者又曰衆婦人户外北面衆兄弟堂下北面注衆婦人衆兄弟小功以下喪大記曰既正尸子坐於東方卿大夫父兄子姓立于東方有司庶士哭于堂下北靣夫人坐于西方內命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面注世婦為內命婦卿大夫之妻為外命婦外宗姑姊妹之女又曰大夫之喪有命夫命婦則坐無則皆立士之喪皆坐開元禮主人坐於牀東衆主人在其後兄弟之子以下又在其後俱西面南上妻坐于牀西妾及女子在妻之後兄弟之女以下又在其後俱東面南上藉稿坐內外之際南北隔以行帷祖父以下于帷東北壁下南靣西上祖母以下于帷西北壁下南面東上皆舒席坐外姻丈夫於户外之東北面西上婦人於主婦西南面東上皆舒席坐若內喪則尊行丈夫外親丈夫席位于前堂若户外之左右皆南面宗親户東西上外親户西東上凡喪位皆以服精粗為序今堂室異制難云如古但倣開元禮為哭位古者諸侯卿大夫於其宗族有君臣之義故其臣不敢坐于君側今但依士禮婢妾之外皆坐哭寒月老病之人有不堪稿及單席者三年之喪聽坐稿薦期喪以下聽加白氊於席上可也或堂宇狹隘五服不能各為一列則輕服次重服之下絶席以别之自既復之後男女哭劈無數古者哭有劈踊劈拊心也踊躍也問喪曰惻怛之心痛疾之意悲哀志滿氣盛故袒而踊之所以動體安心下氣也婦人不宜袒故發胸擊心爵踊殷殷田田如壞牆然悲哀痛疾之至也注爵踊踊不絶地也曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有至是始就位而哭盡哀止三年之喪夜則寢於尸旁藉稿枕塊羸病者藉以草薦可也期喪以下寢於側近男女異室外親歸其家可也主人出左袒自靣前扱於腰之右盥手洗盞執箱以入侍者一人插匙于米碗執以從置於尸西又一人執巾以從徹枕以巾覆靣恐飯之遺落米也主人就尸東由足而西牀上坐東靣舉巾以匙抄米實于尸口之右并實一錢又於左於中亦如之主人襲謂襲所袒之衣也復位侍者加幅巾充耳設幎目納屐乃襲深衣結大帶設握手覆以衾銘旌銘旌以絳帛為之廣終幅三品以上長九尺五品以上八尺六品以下七尺書曰某官某公之柩官卑曰某君某妻曰某封邑某氏皆無官封即隨其生時所稱以竹為杠長凖銘旌置屋西階上士喪禮為銘各以其物亡則以緇長半幅赬末長終幅廣二寸書銘于末日某氏某之柩注無旗不命之士也末為飾也又曰竹杠長三尺置于宇西階上注杠銘橦也檀弓曰銘明旌也以死者為不可别已故以其旗識之開元禮杠之長凖其絳王公以下杠為龍首仍韜杠喪葬令銘旌長各有尺數魂帛影齊僧附魂帛結白絹為之設椸於尸南覆以帕置倚卓其前置魂帛於倚上設香爐杯注酒果於卓子上是為靈座倚銘旌於倚左侍者朝夕設櫛頮奉養之具皆如平生俟葬畢有祠板則埋魂帛潔地士喪禮重木刋鑿之甸人置重於中庭三分庭一在南注木也縣物焉曰重刋斫治鑿之為縣簪孔也又曰夏祝鬻餘飯用二鬲于西牆下注鬻餘飯以飯尸餘米為粥也又曰羃用疏布久之繫用靲縣于重羃用葦席北面左衽帶用靲賀之結于后注久謂蓋塞鬲口也靲竹䈼也以席覆重辟屈而反兩端交於后左衽西端在上賀加也又曰祝取銘旌置於重檀弓曰重主道也注始死未作主以重主其神也士喪禮將葬甸人抗重出自道道左倚之雜記重既虞而埋之注就所倚處埋之開元禮重木倣此今國家亦用之喪葬令諸重一品柱鬲六五品以上四六品已下亦然士民之家未嘗識也皆用魂帛魂帛亦主道也禮大夫無主者束帛依神今且從俗貴其簡易然世俗或用冠帽衣屐裝飾如人狀此尤鄙俚不可從也又世俗皆畫影置於魂帛之後男子生時有畫像用之猶無所謂至于婦人生時深居閨闥出則乘輜軿擁蔽其面既死豈可使畫工直入深室揭掩面之帛執筆望相畫其容貌此殊為非禮勿可用也又世俗信浮屠誑誘於始死及七七日百日期年再期除喪飯僧設道場或作水陸大會寫經造像修建塔廟云為此者滅彌天罪惡必生天堂受種種快樂不為者必入地獄銼燒舂磨受無邊波吒之苦殊不知人生含氣血知痛癢或翦爪剃髮從而燒斫之已不知苦況於死者形神相離形則入於黃壤腐朽消滅與木石等神則飄若風火不知何之假使銼燒舂磨豈復知之且浮屠所謂天堂地獄者計亦以勸善而懲惡也苟不以至公行之雖鬼可得而治乎是以唐盧州刺史李丹與妹書曰天堂無則已有則君子登地獄無則已有則小人入世人親死而禱浮屠是不以其親為君子而為積惡有罪之小人也何待其親之不厚哉就使其親實積惡有罪豈賂浮屠所能免乎此則中智所共知而舉世滔滔而信奉之何其易惑難曉也甚者至有傾家破産然後已與其如此曷若早賣田營基而葬之乎彼天堂地獄若果有之當與天地俱生自佛法未入中國之前人死而復生者亦有之矣何故無一人誤入地獄見閻羅等十王者耶不學者固不足與言讀書知古者亦可以少悟矣弔酹賻襚凡弔人者必易去華盛之服喪大記小斂奠弔者襲裘加武帶絰與主人拾踊孔子羔裘𤣥冠不以弔子游弔人襲裘帶絰而入古者弔服有絰唐人猶著白衫今人無弔服故但易去華盛之服亦不當著公服若入酹則須具公服靴笏也作名紙右卷之繫以線題其陰面凡名紙吉者左卷之題陽面凶者反卷之陽面在左陰面在右曰某郡姓名慰同州之人則但云同郡皆不著官職先使人通之主人未成服則護喪為之出見賓曰竊聞某人薨沒尊官則云薨沒或云捐館卑官則云傾逝少年則曰夭沒後書倣此如何不淑因再拜護喪答拜曰孤某遭此凶禍䝉慰問若有賻襚則并言之以未成服不敢出見不勝哀感使某拜又再拜此為子孫被髮徒跣者不出其餘皆出喪大記曰未小斂大夫為君命士為大夫出主人升降未敢由阼階禮也賓答拜自餘如常儀其所賻襚者則先遣人以書致之書儀在後然後往弔既弔而致之亦可也詩云凡民有喪匍匐救之故古有含襚賵賻之禮珠玉曰含衣衾曰襚車馬曰賵貨財曰賻皆所以矜恤喪家助其斂葬也今人皆送紙錢增作諸僞物焚為厭燼何益喪家不若復賻襚之禮既不珠玉則含禮可廢又今人亦無以車馬助喪者則賵禮亦不必存也凡金帛錢穀之類皆可謂之貨財其多少之數則無常凖繫其家之貧富親之遠近情之厚薄自片衣尺帛百錢斗粟以上皆可行之勝於無也孔子遇舊館人之喪入而哭之哀出使子貢脫驂而賻之曰豫惡夫涕之無從也蓋君子行禮情與物必相副苟弔哭雖哀而無賻襚以將之亦君子所恥也前漢王丹友人喪親河南太守陳遵為護喪事賻助甚豐丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慙色然則物豐而誠不副亦君子所不為也古記曰不以靡沒禮不以菲廢禮此之謂也昔子碩欲以賻布之餘具祭器子栁不可曰君子不家於喪請班諸兄弟之貧者然則為人之子孫者豈可幸其親之喪以利其家耶彼為祭器且不可況實囊橐增産業乎故當使司貨别置冊收之古者袒而讀賵賓致命將行主人之使又讀賵所以存録之今宜俟其人至則司貨以冊示之知其得達於主人也其物專供喪用其餘則班諸戚之貧者凡賻襚之物執事者必先執之北面白尸柩雜記曰凡將命鄉殯將命蓋含襚賵賻主為死者故也若已葬則白於靈座然後白主人次白護喪以授司貨書於别冊而藏以待喪用其同族有服之親賻襚之物不白主人以通財故也若主人已成服則衰絰杖哭而禮受弔不迎賓而送之賓進弔主人曰某罪逆深重禍延某親䝉賜慰問不勝哀感稽顙而後拜稽顙謂以頭觸地若非三年之喪則拜後稽顙賓答拜自非親戚雖平日受拜至是須賓主相拜主人置杖坐兀子不設坐褥或設白褥茶湯至則不執托子賓退釋杖而送之此皆俗禮然亦表哀素之心故從之其非三年之喪未成服則小帽勒帛既成服則服其服而出辭云私門不幸某親喪亡䝉賜慰問不勝哀感拜而後稽顙餘皆如常儀凡弔人者必有戚容曲禮臨喪不笑入臨不翔檀弓曰行弔之日不飲酒食肉孔子於是日哭則不歌又食於喪者之側未嘗飽也若在喪者談笑諧謔豈弔人之道耶若賓與亡者為執友則入酹婦人非親友及與其子為執友嘗升堂拜母者則不入酹名紙既通喪家於靈座前炷香澆茶斟酒設席褥家人皆哭若主人未成服則護喪出延賓曰孤某須矣賓入至靈前哭盡哀古禮弔人無不哭者世人皆以無涕為僞哭故耻之弔酹多不哭人之性自有少涕淚者不可必責于人孔子弔於舊館而出涕亦鮮矣若知生而不知死勿哭可也若親戚朋友死安可以不哭哉乃焚香再拜跪酹茶酒俯伏興再拜主人披髮徒跣扱上衽自椸左哭而出賓東向弔主人西向稽顙再拜秦穆公弔公子重耳重耳稽顙不拜以未為後是故不成拜今人衆子皆拜非禮也然恐難頓改賓答拜主人興進謝曰某罪逆深重禍延某親䝉賜沃酹不勝哀感又再拜賓答拜賓主相向哭盡哀賓先止寬釋主人曰修短有命痛毒奈何望抑損孝思俯從禮制主人官尊則云伏望揖而出主人不送哭而反護喪為之送賓若主人已成服則自出受弔畢若賓請入酹則主人命炷香斟茶酒於靈座前家人皆哭主人揖賓遂導賓哭而入賓亦哭而入至靈座前主人立于賓東北向立哭賓酹如上儀酹畢主人西向謝賓曰已辱臨弔重煩沃酹不勝哀感稽顙再拜賓答拜相向哭寬釋如上儀賓出主人送至聽事如常儀自有三年之喪則不出弔人為其以人之親忘己之親故也期喪十一月以後可以出弔如有服而將往哭之則服其服而往謂有服之親死而往哭之非弔也服其服謂服新死者之服也事見雜記檀弓曰有殯聞遠兄弟之喪雖緦必往非兄弟雖鄰不往若執友死雖齊衰亦可以往哭曾子之哭子張是也凡弔及送喪葬者必助其喪事而勿擾也助謂問其所乏分導營辦貧者為之執綍負土之類擾謂受其飲食財貨小斂厥明陳小斂衣于堂東北下以席凡斂葬者孝子愛親之肌體不欲使為物所毁傷故裹之衣衾盛于棺槨深藏之於地下檀弓曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣古者死之明日小斂又明日大斂顛倒衣裳使之正方束以絞衾韜以衾冒皆所以保其肌體也今世俗有襲而無大小斂所闕多矣然古者士襲衣三稱大夫五稱諸侯七稱公九稱小斂尊卑通用十九稱大斂士三十稱大夫五十稱君百稱此非貧者所辦也今從簡易襲用衣一稱小大斂則據死者所有之衣及親友所襚之衣隨宜用之若衣多不必盡用也夏后氏斂用昏商人斂用日中周人斂用日出今事辦則斂不拘何時設桌子於阼階東用置饌及杯注於其上羃之以巾古者小斂之奠用牲今人所難辦但如待賓客之食品味稍多於始死之奠則可也設盥盆二帨巾各二於饌其東有臺祝所盥其西無臺執事者所盥中各有架别以桌子設潔滌盆新拭巾於其東所以洗盞拭盞自此至遣奠皆同具括髮麻免布及髽麻古者主人素冠環絰視小斂既而男子括髮婦人髽皆有首絰腰絰始死去冠二日去笄纚括髮男子括髮以麻婦人髽帶麻髽者去纚為紒也南宫縚之妻之姑之喪夫子誨之髽榛以為笄長尺而總八寸喪服小記惡笄終喪今恐倉卒未能具冠絰故於小斂訖男子婦人皆收髮為髻先用麻繩撮髻又以布為頭􅔮斬衰者括髮紐麻為繩齊衰以下至同五世祖者皆免列布或縫絹廣寸婦人髽亦紐麻為繩齊衰以下亦用布絹為免皆如幧頭之制自項向前交于額上郤繞髻如著幧頭也為母雖齊衰亦用麻婦人惡笄當用鏹叉或竹木骨角為簪至於鐶釧之類用金銀者居喪盡當去之設小斂牀施薦席氊褥於西階之西執事者鋪絞絞以細布或絹為之一幅析為三鋪橫三於下縱一於上橫者足以周身相結縱者上足以掩首下足以掩足古者折其末使可結然布强而闊難結不若於兩端各綴二絹帶則緊急復衾小斂衣于牀或顛或倒取方而已斂時平鋪其衣不復穿袖又去枕舒絹或疊衣藉首卷其兩端夾首兩旁以補肩上空虛之處又卷衣以夾兩脛然後以餘衣掩尸裹之以衾末掩其靣蓋孝子猶俟其復生欲時見其面故也及將大斂則并掩首裹之束之以絞使其形正方適足滿棺鋪時即依此次叙上衣不倒上衣謂公服襴衫之類故尊之執事者舉牀自西階升堂設於中間襲狀之南古者小斂席于户內設牀第於兩楹之間既斂移於堂今堂室之制異於古且從簡易故小斂亦於中間乃遷襲奠卓子下闕棺槨原本全文俱闕大斂殯原本上文闕即又揣其空缺之處卷衣塞之務令充實不可搖動慎勿以金玉珍玩置棺中啓盜賊心收衾先掩足次掩首次掩左次掩右令棺中平滿主人主婦憑哭盡哀婦人退入幕下然後召匠加蓋下釘徹小斂牀役者纍墼塗殯訖祝取銘旌設跗立於賓東跗杠足也其制如人衣架復設靈座於故處主人以下皆復位如故凡動尸舉柩主人以下哭劈無算曲禮在床曰尸在棺曰柩若無護喪則主人當輟哭親視殯斂務令安固不可但哭而已祝帥執事者盥手舉新饌自阼階升置靈座前祝焚香洗盞斟酒奠之卑幼再拜哭皆如小斂奠之儀士喪禮卒塗祝取銘置于肂主人復位踊襲注為銘設跗樹之肂東又曰乃奠燭升自阼階祝執巾席從設于奧東面注自是不復奠于尸室中西南隅謂之奧既夕記燕養饋羞湯沐之饋如生日注燕養所用供養也饋朝夕食也羞四時之珍異孝子不忍一日廢其事親之禮於下室日設之如生也又曰朔月若薦新則不饋於下室注以殷奠有黍稷也開元禮三品以上將奠執巾几席者升自阼階入設于室之西南隅東面贊者以饌升入室西面設於席前六品以下設於靈座前席殯於外者施蓋訖設大斂之奠於殯東既殯設靈座於下室西間東向施床几案屏障服飾以時上膳羞及湯沐皆如平生下室者謂燕寢無下室則設靈座於殯東按古者室中牖在西戶在東故設神座於西南隅東靣得其宜也今士大夫家既不可殯於聽事則正室之外别無燕寢又朝夕之奠何嘗不用飯而更設靈座於下室西間東向兩處饋奠甚無謂也又靈座若在殯而奠於殯東亦無禮也今但設奠於靈座前庶從簡易主人以下各歸其次留婦人兩人守殯共止代哭者書儀卷五
