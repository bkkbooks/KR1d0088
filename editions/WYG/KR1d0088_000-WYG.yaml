  text: 欽定四庫全書經部四
  hash: sha256:753fed3570de885feea2655f2afda2dcac3de78d0edd6607684749ed59d8b745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0088_WYG_000-1a, image: WYG0142/WYG0142-0457a.png}
body:
  text: 書儀目錄禮類六雜禮書之屬卷一表奏公文私書家書卷二冠儀卷三㛰儀上卷四㛰儀下卷五喪儀一卷六喪儀二卷七喪儀三卷八喪儀四卷九喪儀五卷十喪儀六欽定四庫全書經部四書儀禮類六雜禮書之屬提要臣等謹按書儀十卷宋司馬光撰考隋書經籍志謝元有内外書儀四卷蔡超有書儀二卷以至王宏王儉唐瑾皆有此著又有婦人書儀八卷僧家書儀五卷盖書儀者古私家儀注之通名崇文總目載唐裴茞鄭餘慶宋杜有晉劉岳尚皆用斯目光是書亦從舊稱也凡表奏公文私書家書式一卷冠儀一卷婚儀二卷喪禮六卷朱子語録胡叔器問四先生禮朱子謂二程與横渠多是古禮温公則大抵本儀禮而叅以今之所可行者要之温公較穏其中與古不甚逺是七分好又與蔡元定書曰祭禮只是於温公書儀内少増損之云云則朱子固甚重此書後朱子所修祭儀為人竊去其稿不傳則此書為禮家之典型矣馬端臨文獻通考載其父廷鸞之言謂書儀載婦入門之日即拜先靈廢三月廟見為非禮引朱子語録以為惑於陳鍼子先配後祖一語又謂檀弓明載殷練而袝周卒哭而袝孔子善殷而云周已戚書儀載袝廟在卒哭後於禮為太遽案杜預左傳注謂逆婦必先告廟而後行故楚公子圍稱告荘共之廟鄭忽先逆婦而後告廟故謂先配而後祖其事與廟見無闗光未必縁此起義又古者三月廟見乃成為婦故有反馬之禮有未及三月而死則仍歸塟母家之禮後世於親迎之日即事事成其為婦三月之内設有乖忤斷不能離婚而逐之設有殀折斷不能舉柩而返之也何獨廟見之期堅執古義乎至於殷練而袝孔子善之其說雖見檀弓考宋史禮志所載袝廟之儀實從周禮國制如是士大夫安得變之亦未可以是咎光也他如深衣之制朱子家禮所圖不内外掩襲則領不相交此書釋曲祫如矩以應方句謂孔疏及後漢書馬融傳注所說似於頸下别施二衿映所交領使之正方如今時服上領衣不知領之交㑹處自方疑無他物云云闡發鄭注交領之義最明與方言衿謂之交郭璞注為衣交領者亦相符合較家禮所說特為詳確斯亦光考禮最精之一証矣禮記大全檀弓忌日不樂條下載劉璋之說引司馬氏書儀忌日則去華飾之服薦酒食云云此本無之然此本首尾完具尚從宋本翻雕不似有所闕佚者或劉璋偶誤記歟乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
