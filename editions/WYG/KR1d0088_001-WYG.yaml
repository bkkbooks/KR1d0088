  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0088_WYG_001-1a, image: WYG0142/WYG0142-0460c.png}
body:
  text: 書儀卷一宋司馬光撰表奏表奏元豐四年十一月十二日中書劄子據詳定官制所修到公式令節文表式臣某言云云臣某誠惶誠懼賀則云誠懽誠忭後辭末准此頓首頓首辭云云謹奉表稱謝以聞稱賀同其辭免恩命及陳乞不用狀者亦准此臣某誠惶誠懼頓首頓首謹言年月日具位臣姓名上表右臣下奏陳皆用此式上東宫牋亦倣此但易頓首為叩頭不稱臣命婦上皇太后皇后准東宫牋稱妾奏狀式某司自奏事則具官貼黄節狀内事某事云云若无事因者於此便云右臣右云云列數事則云右謹件如前謹録奏聞謹奏取㫖者則云伏候勅旨乞降付去處貼黄在年月前年月日具位臣姓名有連書官即依此列位狀奏右臣下及内外官司陳叙上聞者並用此式在京臣竂及近臣自外奏事兼用劄子前不具官事末云取進止用牓子者惟不用年不全幅不封餘同狀式皆先具檢本司官畫日親書付曹司為案本官自陳事者則自留其案公文申狀式某司自申狀則具官封姓名某事云云有事因則前具其事无所因則便云右某右云云謹具狀申如前列數事則云右件狀如前云云某司謹狀取處分則云伏候指揮年月日具官封姓名有連書官則以次列銜狀右内外官司向所統屬並用此式尚書省司上門下中書省樞密院及臺省寺監上三省樞密院省内諸司并諸路諸州上省臺寺監並准此牒式某司牒某司或某官某事云云牒云云若前列數事則云牒件如前云云謹牒年月日牒列位三司首判之官一人押樞密院則都承㫖押右門下中書尚書省以本省樞密院以本院事相移並謂非被受者及内外官司非相管隷者相移並用此式諸司補牒亦同惟於年月日下書書令史名辭末云故牒官雖統攝而無狀例及縣於比州之類皆曰牒上寺監於御史臺秘書殿中省准此於所轄而無符帖例者則曰牒某司不闕字尚書省於御史臺祕書殿中省及諸司於臺省臺省寺監於諸路諸州亦准此其門下中書省樞密院於省内諸司臺省寺監官司辭末云故牒尚書省於省内諸司准此私書上尊官問候賀謝大狀具位姓某右某述事云云謹具狀上問尊候申賀上謝隨事謹狀舊云謹錄狀上牒件狀如前謹牒狀未姓名下亦云牒此葢唐末屬寮上官長公牒非私書之體及元豐改式士大夫亦相與改之年月日具位姓某狀封皮狀上某位具位姓某謹封重封上顯云狀上某所某位下云謹重封與平交平狀具位姓某右某啓述事云云謹奉狀起居陳賀陳謝隨事㐲惟照詧謹狀月日具位姓某狀封皮用靣簽某位具位姓某謹封重封題與大狀同後封皮重封皆准此上書月日具位某頓首再拜上書某位執事此上尊官之儀也稍尊則云閣下平交則云謹致書某位足下凡閣下謂守黄閣者非宰相不當也而末俗競以虚名相尊今有謂宰相為閣下則必怒以為輕而今人非平交不可施矣此無如之何且須從俗此下述事云云不宣某頓首再拜某位執事啓事具位姓某右某啓述事云云謹奉啓事陳聞陳賀陳謝隨事伏惟尊慈俯賜鑒念不宣謹啓月日具位姓某啓上封皮用靣簽某位具位姓某啓上謹封前上書封皮改啓為書字上尊官時候啓狀裴書儀僚屬典吏起居官長啓狀止如此无如公狀之式者裴文有四海吉書分五等以父之執友疎屬尊親受業師為極尊年紀髙於已或職掌稍髙及姊夫妻兄之屬為稍尊齒爵相敵者為平懷年小於已官卑於已及妻弟妹夫為稍卑先曾服事及弟子之類為極卑今以裴之啓狀為大書四海吉書為書小簡及平日往來手簡而微為増損以叶時宜以齒爵極逺者為尊官與極卑不甚相逺者為稍卑改平懷為平交又今人與尊官書多為三幅其辭意重複殊无義理凡與人書所以為尊敬者在於禮數辭語豈以多紙為恭耶徒為煩冗而不誠不足法也某啓晷度推移日南長至此冬至之儀也正旦則云元正啓祚萬物惟新月朔及非時起居則各用其月時候如孟春猶寒之意伏惟某位膺時納祐與國同休正旦同月朔及非時起居則云尊體起居萬福某即日蒙恩事役所縻有官則云職業有守未獲趨拜門庭伏乞上為廟朝善保崇重下誠不任詹依懇禱之至謹奉狀陳賀月朔及非時起居則改陳賀為㕘候不宣謹狀月日具位姓某狀上某位座前或云執事執政則云台座執政雖有世契亦不敢叙他人父執則云從表姪上某位幾丈師則云門生上某位先生非平交不可稱其字後手啓准此謹空封皮謹謹上某位座前或台座皆如狀中具位姓某狀封上稍尊時候啓狀平交改卑情不任勤禱之至為用慰勤懷閣下為足下无謹空自餘同某啓時候如前伏惟某位膺時納祐罄無弗宜月朔及非時起居則云尊體萬福某即日䝉免未由覲展伏冀順時善加保養卑情不任勤禱之至謹奉狀陳賀非時起居改陳賀為㕘候不宣謹狀月日粗銜姓某狀上某位閣下或云侍史或云左右或云足下若有契素則云從表弟上某位幾兄後稍尊手啓准此謹空封皮狀上某位閣下粗銜姓某謹封與稍卑時候啓狀極卑止有手簡及委曲无啓狀某啓時候如前恭惟某位膺時納祐罄無弗宜月朔及非時起居則云動止萬福某即日幸如宜未由展奉惟冀順時善加保愛用慰逺懷謹奉狀不宣謹狀月日若有事素則云從表粗銜姓某狀上某位若有事素則云幾弟封皮狀上某位粗銜姓某謹封上尊官手啓書中小簡亦同但紙尾有日无月去謹奉啓及謹空字某惶恐頓首再拜述事云云謹奉啓不備備具宣悉據理亦同但世俗有此分别今須從衆某惶恐頓首再拜某位座前執政則云台座月日謹空封皮謹謹上某位座前台座如啓中某啓封别簡某啓或云再啓或云又啓述事云云某頓首再拜上稍尊手啓書中小簡及别簡如大官某再拜述事云云謹奉啓不宣某再拜某位閣下或云侍史或云左右若其人知州府則云鈐下月日封皮啓上某位閣下等如啓中某謹封與平交手簡書中小簡同别簡直述事末云頓首某啓述事云云不宣某頓首某位足下或云左右日封皮手啓上或止云啓上某位某謹封與稍卑手簡書中小簡同凡書啓若不能一一如儀寧於平交用稱尊不可用稍卑某啓述事云云不宣某咨白某位日封皮簡呈某位某謹封謁大官大狀具位姓某右某謹詣門屏祇候起居㕘謝賀辭違隨事已欲他適往辭人曰辭人欲他適已往别之曰攀違某位伏聴處分謹狀舊亦云牒件狀如前謹牒狀末姓名下又云牒元豐改式士大夫亦改之年月日具位姓某狀謁諸官平狀具位姓某右某祇候世俗皆云謹祇候按謹即祇也語渉複重今不取起居謝賀辭違隨事按祇候某人起居乃語自唐末以來皆以云祇候起居某人今從衆某位謹狀月日具位姓某狀平交手刺大約如此時改臨時某爵无爵者言官某里姓某无官者止稱鄉里此平生未曽往還者也若已相識則去爵里往還熟則去姓専謁見謝賀辭别隨事某位月日謹刺名紙取紙半幅左卷令𦂳實以線近上横繋之題其陽靣凡名紙吉儀左卷題於左掩之端為陽靣凶儀右卷題於右掩之端為陰靣云鄉貢進士姓名家書上祖父母父母上外祖父母改孫為外孫著姓餘同某啓孟春猶寒時候隨月伏惟某親尊體起居萬福述先時往來書云云某在此與新婦以下各循常若有尊長在此則於與新婦字上添侍奉某親康寧外字乞不賜逺念凡此皆平安之儀若有不安者即不用此語後准此下述事云云未由省侍伏乞倍加調䕶下誠不任瞻戀之至謹奉狀不備孫子男則稱男女則稱女某再拜上某親几前封皮謹謹上某親几前孫男女同某狀封重封平安家書附上官某州某縣姓某凡人得家書喜懼相半故平後安字不可闕使見之則喜家書重封准此孫男女同粗銜某謹重封上内外尊屬謂伯叔祖父母伯叔父母姑舅妗母姨夫姨母妻之父母改起居為動止省侍為覲省調䕶為保重瞻戀為贍仰几前為座前姪甥壻隨所當稱惟與妻之父母書不稱新婦稱封邑無封邑則改新婦以下為家中骨肉古人謂父為阿郎謂母為孃子故劉岳書儀上父母書稱阿郎孃子其後奴婢尊其主如父母故亦謂之阿郎孃子以其主之宗族多故更以行第加之今人與妻之父母書稱其妻為幾娘子殊亂尊卑名不正則言不順士君子宜有以易之餘皆如上父母書上内外長屬謂兄姊表兄姊及姊夫妹與嫂亦同改尊體起居萬福為動止康和乞不賜逺念為幸不念及省侍為㕘省伏乞倍加調䕶為為國保燮下誠不任瞻戀之至為卑情不勝依戀弟妹内外弟妹隨所當稱劉岳書儀云舅之子稱内弟不書姓姑之子稱外弟書姓今人亦通稱表弟也几前為左右狀為啓餘如上父母書封皮啓上某親弟某謹封與妻書某咨春寒春暄夏熱秋熱秋凉冬寒隨時動履清勝或云常勝某此粗遣免述事云云不悉裴儀作不具今從弟妹法某書逹某邑封裴儀云某狀通幾娘子足下於理亦似未安若无封邑宜稱其字月日封皮書逹某邑封某謹封重封云平安家書附至本宅與内外卑屬謂弟妹表弟妹幾弟妹則云幾妹春寒寒暄隨時想與諸尊㓜或云長㓜隨事休宜兄此粗常述事云云不悉兄報某親月日封皮書寄幾弟親弟妹不空表弟妹空兄手書表弟妹云表兄姓某謹封以下書皮重封皆同重親弟妹云平安家書附至某州某縣幾某官處无官封則云幾弟處表則云書附至某州某縣幾某官處粗銜姓押重封表弟云謹重封與㓜屬書謂兄弟之子孫告幾某官春寒寒暄隨時想汝與諸尊㓜或云長㓜隨事吉健翁或伯或叔此與骨肉並如常述事云云不具翁餘親准此裴儀與兒及孫姪等書其末皆云及此不多今以與詔語相渉更改從俗告幾某官省月日封皮書付幾某官翁餘親准此封重封如卑屬與子孫書告名子孫名也春寒寒暄隨時想汝與諸㓜卑㓜隨事吉健述先時往來書吾此與骨肉並如常述事云云不具翁父同告名省封皮委曲付名翁父同封重封平安家書附至名某州某縣付孫粗銜姓押重封與外甥女壻書封皮重封與表弟妹同某咨春寒寒暄隨時想與尊㓜如宜與女壻者云與幾姐及外孫如宜某此粗常述事云云不悉某咨姓甥某官壻云某郎月日婦人與夫書婦人與諸親書皆與男子同於子孫之婦稱吾於夫家尊長稱新婦某氏於卑㓜稱婆稱伯母叔母或稱老婦於已家尊長稱兒於卑㓜稱姑稱姊於外人不當通書若不得已通書亦當稱新婦今人皆稱兒非也上舅姑書如父母但改新婦以下稱其夫官而已與妯娌書如長屬其末自稱姒某氏娣某氏與子孫書云告幾新婦餘如與子孫書其與尊長者雖有封邑不敢稱之古者婦人謂夫曰君自稱曰妾今夫與妻書稱名妻與夫書稱妾乃冀缺梁鴻相推敬之道也妾啓春寒寒暄隨時動止康和或云康勝妾即此䝉免諸㓜無恙此平安之儀也若已不安則不云蒙免子孫有不安者則不云諸㓜无恙此下述事云云不宣妾上某官侍者无官則稱良人月日封皮狀上某官邑封某氏妾謹封與僕隸委曲僕隸上郎主當依公狀式姓名僕隸姓名也述事云云不具委曲付姓名封皮委曲付姓名押封書儀卷一
