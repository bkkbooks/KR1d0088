  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0088_WYG_009-1a, image: WYG0142/WYG0142-0514a.png}
body:
  text: 書儀卷九宋司馬光撰喪儀五小祥將及期年先以栗木為祠版并趺皆如桑板之制考以紫囊妣以緋囊盛之各有藉褥貯于漆匣於十一月之末主人設香爐炷香卜筮日于影堂外西向先擇日于來月下旬卜筮之不吉次擇中旬不吉次擇上旬既得吉日主人焚香于靈座前北向立祝執辭出于主人之左東向讀曰孝子某將以來月某日祇薦常事于先考某官妣言某封占既得吉敢告既讀卷詞懷之興復位主人再拜退或不卜則從初忌日小祥前一日主人及諸子俱沐浴櫛髪翦爪衆丈夫洒掃滌濯主婦帥衆婦滌釡鼎具祭饌如時祭主人主婦縱不能親為亦須監視務極精㓗丈夫婦人各設次于别所置練服于其中禮既虞卒哭則有受服間傳期而小祥男子除乎首婦人除乎帶今人無受服及練服小祥則男子除首絰及負版辟領衰婦人截長裙不令曵地而已應服期者及小祥皆改吉服然猶盡其月不服金珠錦繡紅紫執事者置卓子設香爐酒盞注于靈座前置盥盆帨巾于靈座西南别設座于靈座前卓子之右東向别置卓子于靈座東南西向置栗版匣及筆硯墨于其上主人立于靈座前北向使善書者西向立題栗版畢以蠟塗炙令入理刮拭之復納于匣祝盥手奉桑板置于東向之座次奉栗版置于靈座舊位出之藉以褥主人盥手焚香斟酒酹之退少立祝執辭出讀曰年月日孝子某開元禮小祥祝文猶稱孤哀子按士虞禮祔祭已稱孝子吉祭而已敢昭告于先考某官妣言某氏來日小祥栗主既成伏惟尊靈舍舊從新是慿是依祝興主人再拜哭盡哀明日夙興執事者設元酒一瓶酒一缾刀子拭布酒盞注于卓子上在東階之上西向設香卓子于靈前堂中央置香爐香合香匙于其上裝灰餅設火爐湯瓶火筯于西階上對酒瓶設盥盆二于西階下一盆有臺供親戚一盆供執事者各有帨東上乃具饌陳于堂門外之東質明主人倚杖于門外喪服小記虞杖不入于室祔杖不升于堂注然則練杖不入門明矣入與期親各服其服坐立哭于靈前如虞祭之位若大功已下有來預祭者釋去華盛之服同叙坐立亦如虞祭之位大祥禫准此哭盡哀主人及期親出就次易練服及吉服復入就位哭頃之祝止哭者主人盥手焚香如虞祭帥衆丈夫設肉食主婦帥衆婦女設􅋗食米食如卒哭執事者開酒主人斟酹酒如虞祭祝執辭讀曰年月日孝子某敢昭告于先考某官妣云某封日月不居奄及小祥夙興夜處小心畏忌不惰其身哀慕不寧敢用柔毛嘉薦普淖明齊溲酒薦此常事于先考某官妣如前尚饗祝興主人再拜退復位哭止亞終獻闔門啓門復入就位皆如虞祭祝東向告利成如卒哭祝斂栗版韜藉匣之置靈座主人以下哭拜出就次執事者徹饌如虞祭祝取桑版匣帥執事者徹東向坐埋桑主匣于屏處㓗地大祥再期而大祥于二十三月之末主人卜如小祥禮丈夫婦人各設次于别所置禫服其中今世丈夫禫服垂脚黲紗幞頭皂布衫脂皮爁鐵帶或布裏角帶未大祥間出詣人家亦假而服之婦人可以冠梳假髻以鵝黄青碧皂白為衣履其金銀珠玉紅繡皆不可用開元禮云備内外受服禫祭云仍祥服又云著禫服按世俗無受服謂大祥為除服即著禫服今從衆其日夙興執事者設酒饌香火盥器皆如小祥質明主人與未除服者入就位于靈前立哭盡哀已除服者若來預祭亦哭于故位如小祥出就次易禫服復入就位哭頃之祝止哭者主人降盥手焚香如虞祭帥衆男設肉食主婦帥衆婦女設􅋗米食如卒哭執事者開酒主人斟酹酒如虞祭改小祥祝詞云奄及大祥又曰薦此祥事惟不改題栗主埋桑主外其餘如小祥之儀祭畢遷影堂及祠匣于影堂徹靈座斷杖弃之屏處禫祭大祥後間一月禫祭士虞禮中月而禫鄭注云猶間也禫祭名也自喪至此凡二十七月按魯人有朝祥而暮歌者子路笑之夫子曰踰月則其善也孔子既祥五日彈琴而不成聲十日而成笙歌檀弓曰祥而縞注縞冠素紕也又曰禫徙月樂三年問曰三年之喪二十五月而畢然則所謂中月而禫者盖禫祭在祥月之中也歴代多從鄭説今律勑三年之喪皆二十七月而除不可違也紕避支切是月之中隨便擇一日設亡者一位于中堂祝奉祠版匣置于座出之藉以褥主人以下不改服入就位俱立哭祝止哭主人降盥手焚香如虞祭帥衆設肉亦同卒哭禮執事開酒主人斟亦如虞祭禮拜不哭改大祥祝詞云奄及禫祭又云祗薦禫事亞終獻闔門啓門復入就位皆如虞祭而不哭祝東向告利成主人以下應拜者再拜哭盡哀祝匣祠版奉之還于影堂主人以下從至影堂不哭退執事者徹饌居喪雜儀檀弓曰始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然又顔丁居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如有不及其反而息雜記孔子曰大連少連善居喪三日而不怠三月不解期悲哀三年憂喪服四制曰仁者可以觀其愛焉知者可以觀其理焉強者可以觀其志焉禮以治之義以正之孝子弟弟正婦皆可得而察焉曲禮曰居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章檀弓大功廢業或曰大功誦可也居喪但勿讀樂章可也雜記三年之喪言而勿語對而不問言言已事也為人説為語喪大記父母之喪非喪事不言既葬與人君言王事不言國事大夫士言公事不言家事檀弓髙子臯執親之喪未嘗見齒言笑之㣲雜記䟽衰之喪既葬人請見之則見不請見人小功請見人可也又凡喪小功以上非虞祔練祥無沐浴曲禮頭有瘡則沐身有瘍則浴喪服四制百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者靣垢而已凡此皆古禮今之賢孝君子必有能盡之者自餘相時量力而行之可也訃告書尊卑長㓜如常日書儀粗生紙直書其事勿為文飾致賻襚狀具位姓某某物若干右謹専送上某人靈筵聊備賻儀財物曰賻儀衣服曰襚儀香酒曰奠儀伏惟歆納謹狀年月日具位依常式封皮狀上某官靈筵具位某謹封此是亡者官尊其儀乃如此若平交及降等即狀内無年封皮用靣簽題曰某人靈筵下云狀謹封謝賻襚書今三年之喪未卒哭不發書多令姓孫及其餘親發謝書具位某某物若干右伏蒙尊慈以某發書者名某親違世大官云薨沒特賜賻儀襚奠隨事下誠不任哀感之至謹具狀上謝謹狀年月日具位某狀上某位某謹封此與尊儀也如平交即改尊慈為仁特賜為貺去下誠字後云謹奉陳謝謹狀無年封皮用靣簽餘如前慰大官門狀某位姓某右某謹詣門屏祗慰某位伏聴處分謹狀年月日具位某狀慰平交某位姓某右某祗慰某官謹狀月日具位姓某狀慰人名紙形如常但題其陰靣云某郡姓名慰此與平交已下用之若平交已下期喪亦用慰狀大功已下用起居狀相靣而見慰慰人父母亡䟽狀鄭儀書止一紙云月日名頓首末云謹奉䟽􅃤愴不次姓名頓首裴儀看前人稍尊即作複書一紙月日名頓首一紙無月日末云謹奉䟽幓愴不次郡姓名頓首封時取月日者向工如敵體即此單書劉儀短䟽覆䟽長䟽三幅書凡六紙考其詞理重複如一今參取三本但尊卑之間語言輕重差異耳若别有情事自當更作手簡别幅述之若慰嫡孫承重者如父母法某頓首再拜言不意凶變先某位奄弃榮養承訃告驚怛不能己巳伏惟孝心純至思慕號絶何以堪居此上尊官也平交已下止云頓首亡者官尊改不意凶變為邦國不幸無官有素契改先某位為先丈無素契為先府君母亡云先太夫人先太君無封邑者止云先夫人亡者官尊即改奄弃侍養為奄捐舘舍無官止云奄違色養平交云恭惟降等緬維下倣此日月流速遽踰旬朔或云流邁或云不居或云遽及孟仲季春若巳葬則云遽經安厝卒哭則云遽及卒哭小祥大祥禫祭各隨其時哀痛奈何罔極奈何不審自罹荼毒父在母亡即云憂苦氣力何如伏乞平交云伏願降等云惟冀強加􅊡粥已葬則云蔬食俯從禮制某事役所縻在官即云職業有守未由奔慰其于憂戀無任下誠平交已下但云未由奉慰悲慘增深謹奉䟽平交已下改為狀伏惟鑒察降等不用此不備謹䟽平交已下云不宣鄭裴用不次自非有喪恐不當稱月日具位姓某䟽上平交已下可稱郡望并改䟽為狀上某位大孝苫前日月逺云哀前平交已下云哀次劉岳書儀百日内苫前百日外云服次服前封皮䟽上某位苫前具位姓某謹封平交已下用靣簽云某位苫次稍尊用粗銜平交已下用郡望姓名狀謹封重封䟽上某所某位尊長以小紙帖姓平交已下直書姓某官具位某謹封父母亡荅人狀于所尊稱䟽于平交已下稱狀某稽顙再拜言平交已下只去言字盖稽顙而後拜三年之禮也古者受弔必拜之不問㓜賤某罪逆深重不自死滅禍延先考母云先妣承重祖父云先祖考祖母云先祖妣攀號擗踊五内分崩叩地呌天無所逮及日月不居奄踰旬朔或云遽及孟仲季安厝卒哭大小祥禫除隨時酷罰罪苦父在母亡即曰偏罰罪深父先亡則母與父同無望生全即日蒙恩稍尊云免平交去此二字祇奉几筵苟存視息伏承尊慈俯賜慰問哀感之至不任下誠平交云仰承仁恩特垂慰問哀感之情言不能盡降等云逺蒙眷私曲加慰問哀感之深非言可論凡遭父母喪知舊不以書來弔問是無相恤閔之心于禮不當先發書若不得已須至先發當刪此四句餘親彼雖無書弔問已因書亦當言之但不特發書耳末由號訴不勝隕絶謹扶力奉䟽荒迷不次謹䟽月日孤子姓某䟽上平交已下云奉狀謹狀父在母亡稱哀子父先亡母與父同承重者稱孤孫女云孤女平交云狀上某位座前閣下並如常謹空平交無此封皮䟽上某位孤子姓某謹封餘如前平交者封皮重封亦如内封皮與居憂人啓狀某啓日月流邁奄踰旬朔安厝卒哭大祥禫除隨時伏惟平交已下同前孝心追慕沈痛難居孟春猶寒隨時起居支福支者言其毁瘠僅及支梧也稱尊云動止支勝平交云所履降等云支宜支福支和重支祐小重支宜支適小輕支立大輕某即日蒙恩稱尊云免伏乞平交已下同前節哀順變俯從禮制某事役所縻在官如前未由拜慰稱尊云造平交云奉或云展降等云叙其于憂戀無任下誠平交已下但云悲慘増深謹奉狀伏惟鑒察降等即不用此二句不備稱尊已下云不宣謹狀月日具位姓某狀上某位服前餘皆如前居憂中與人䟽狀某叩頭泣血言稱尊已下改言為啓日月流速屢更晦朔奄及大小祥禫隨時攀慕號絶不自勝堪孟春猶寒伏惟某位尊體起居萬福降等無尊體字但云動止餘如前某酷罰罪苦父在母亡則云偏罰罪深無復生理即日蒙恩稱尊云免平交無此二字祇奉几筵苟存視息未由號訴隕咽倍深謹扶力奉䟽云云餘如前式慰人父母在祖父母亡啓狀若已慰其父則更不慰其子可也某啓禍無故常尊祖考某位無官有􅆻即云幾文無􅆻即云尊祖考府君祖母云尊祖妣某封無封云尊祖妣夫人奄忽違世亡者官尊云奄捐舘舍承訃驚怛不能己巳伏惟恭緬如前孝心純至哀慟摧裂何可勝任孟春猶寒未審尊體何似平交已下云所履伏乞深自寛抑以慰慈念某事役所縻在官如前未由趨慰其于憂想無任下誠平交如前謹奉狀云云如前式父若其人父母已亡則此慰祖母狀改痛毒罔極為痛苦改荼毒憂苦為凶變改強加􅊡粥為深自抑割去大孝至孝字改苫前為座前謹空苫次為足下祖父母亡荅人啓狀某啓不圖凶禍先祖考祖母云先祖妣奄忽弃背痛苦摧裂不自勝堪専介臨門伏蒙尊慈特賜書尺慰問哀感之至不任下誠仁恩眷私隨等孟春猶寒亦隨時伏惟某位尊體起居萬福平交如前某即日侍奉幸免他苦未由詣左右展洩徒増哽塞謹奉狀上謝不宣極尊云不備謹狀慰人伯叔父母姑亡某啓不意凶變尊伯父某位伯母叔父母姑隨時降等改尊為賢奄忽傾逝亡者官尊云奄捐舘舍承訃驚怛不能己巳伏惟親愛敦隆哀慟沈痛何可堪勝孟春猶寒尊體何如伏乞深自寛抑以慰逺誠某事役云云如前式伯叔父母姑亡荅人慰某啓家門不幸幾伯父伯叔母准此姑曰幾家姑不言封奄忽弃背摧痛酸楚不自堪忍伏蒙尊慈云云如前式奉無父母者不云侍慰人兄弟姊妹亡比慰人伯叔父母亡啓狀但改尊伯父為尊兄亦曰令兄弟曰令弟姊曰令姊妹曰令妹平交已下改為賢若彼有兄弟姊妹數人須言行第或官封姊妹無封者稱其夫姓云某宅令姊妹親愛為友愛餘並同兄弟姊妹亡荅人慰比伯父母亡荅人狀但改幾伯父為家兄弟曰舍弟姊曰家姊妹曰小妹有數人者須言行第不必言封改弃背為喪逝餘並同慰人妻亡此慰人伯叔父母亡狀但改尊伯父為夫人郡縣君無封即云賢閫即改傾逝為薨逝改驚怛為驚愕改親愛敦隆為伉儷伉音亢儷音麗義重改哀慟為悲悼餘並同妻亡荅人比伯叔父母亡荅人但改家門為私家幾伯父奄忽弃背為室人奄忽喪逝摧痛為悲悼餘並同慰人子姪孫亡某啓伏承平交已下為切承令子某位姪曰令姪孫曰令孫平交已下為賢無官者稱秀才若有數人須言行第遽爾天沒不勝驚怛伏惟恭緬同前慈愛隆深悲慟沈痛何可堪勝餘並同慰人伯叔父母狀改寛抑為抑割子孫亡荅人狀比妻亡荅人慰啓但改私家為私門室人奄忽喪逝為小子某亡者名也姪曰少姪孫曰㓜孫遽爾夭折改悲悼曰悲念餘並同自伯叔父母已下今人多只用平時往來狀止於小簡言之雖亦可行但裴鄭有此式古人風義敦篤當如此裴鄭又有慰外祖父母舅姨妻父母外甥三殤及僧尼并親戚相弔等書今並刪去書儀卷九
