body:
  text: 書儀卷十宋司馬光撰喪儀六祭凡祭用仲月王制大夫士有田則祭無田則薦注祭以首時薦以仲月今國家惟享太廟孟月自享六廟濮王廟皆用仲月以此私家不敢用孟月主人即目在此男家長也曲禮支子不祭曽子問宗子為士庶子為大夫以上牲祭于宗子之家古者諸侯卿大夫宗族聚于一國故可以如是今兄弟仕宦散之四方雖支子亦四時念親安得不祭也及弟子孫皆盛服親臨筮日于影堂外少牢饋食禮曰用丁巳又主人曰來日丁亥注丁未必亥也直舉一日以言之耳禘于太廟禮曰日用丁亥不得丁亥則己亥辛亥亦用之無則苟有亥焉可也孟説家祭儀用二至二分然今仕宦者職業殊繁但時至事暇可以祭則卜筮亦不必亥日及分至也若不暇卜日則止依孟儀用分至于事亦便也仁宗時嘗有詔聽太子少保以上皆立家廟而有司終不為之定制度惟文潞公立廟于西京他人皆莫之立故今但以影堂言之主人西向立衆男在其後共為一列以長幼為敘皆北上置卓子于主人之前設香爐香合及蓍于其上主人搢笏進焚香熏而命之曰某將以某日諏此嵗事適其祖考尚饗乃退立以蓍授筮者令西向筮不吉則更命曰或無能筮者則以抔珓代之既得吉日乃入影堂主人北向子孫在其後如門外之位西上主人搢笏進焚香退立祝懷辭書辭于紙出于主人之左東向搢笏出辭跪讀之曰孝孫具官無官則但稱名某將以某日祇薦嵗事于先祖考妣占既得吉敢告卷辭懷之執笏興復位主人再拜皆出古者四時之祭習以為常故筮日宿尸賔而不告祖考今始變時俗筮日而祭故不得不告蓋人情當然前期三日主人帥諸丈夫致齊于外男十嵗以上皆居宿于外主婦帥諸婦女致齊于內雖得飲酒而不至亂亂謂改其常度食肉不茹葷葷謂蔥韭蒜之類有臭氣之物不弔喪不聽樂凡凶穢之事皆不得預専致思于祭祀祭義曰齋之日思其居處思其笑語思其志意思具所樂思其所嗜齋三日乃見所為齋者前期一日主人帥衆丈夫及執事者灑掃祭所影堂迫隘則擇廳堂寬潔之處以為祭所滌濯祭器主人縱不親滌亦須監視務令蠲潔設倚卓考妣並位皆南向西上古者祭于室中故神坐東向自後漢以來公私廟皆同堂異室南向西上所以西上者神道向右故也主婦主人之妻也禮舅沒則姑老不與于祭主人主婦必使長男及婦為之若或自欲預祭則特位于主婦之前參神畢升立于酒壺之北監視禮儀或老疾不能久立則休于他所俟受胙復來受胙辭神而已帥衆婦女滌釡鼎具祭饌往嵗士大夫家婦女皆親造祭饌近日婦女驕倨鮮肯入庖厨凡事父母舅姑雖有使令之人必身親之所以致其孝恭之心今縱不能親執刀匕亦須監視庖厨務令精潔未祭之物勿令人先食之及為貓犬及鼠所盜汚開元禮六品以下祭亦有省牲陳祭器等儀按士大夫家祭其先者未必皆殺牲又簠簋籩豆鼎爼罍洗皆非私家所有今但能别置碗楪等器矣専供祭祀平時收貯勿供他用已善時蔬時果各五品膾今紅生炙今炙肉羮今炒肉殽今骨頭軒今白肉音獻脯今乾脯醢今肉醬庶羞豬羊之外珍異之味麵食如薄餅油餅和餅蒸餅棗糕環餅捻頭餺飥之類是也米食謂黍稷稻粱粟所為飯及粢糕團粽餳之類皆是也共不過十五品若家貧或鄉土異宜或一時所無不能辦此則各隨其所有蔬果肉麵米食各數品可也執事者設盥盆有臺于阼階東南帨巾有架在其北盥濯手也帨手巾也此主人以下親戚所盥無阼階則以階之東偏為阼階西偏為西階又設盥盆帨巾無臺架者于其東此執事者所盥少牢饋食禮設洗于阼階東南設罍水于洗東有枓設篚于洗西南肆開元禮倣此又云贊禮者引主人詣罍洗執罍者酌水執洗者取盤承水主人盥手執篚者受巾遂進爵主人詣酒樽所執樽者舉冪私家乏人恐難備今但設盥盆帨巾使自盥手帨手以從簡易明日夙興主人以下皆盛服丈夫有官者具公服靴笏無官者幞頭衫帶婦人大袖裾帔各隨其所應服之盛者主人主婦帥執事者詣祭所于每位設蔬果各于卓子南端酒盞匕筯茶盞托醬楪實以醬鹽醯于卓子北端禮主婦薦籩豆設黍稷主人舉鼎設爼今使主婦帥婦女薦蔬果粢盛主人帥衆男薦肉亦倣此執事者設玄酒一瓶其日取井華水充酒一瓶于東階上西上别以卓子設酒注酒盞刀子拭布于其東設香卓于堂中央置香爐香合于其上裝灰瓶設火爐湯瓶香匙火筯于西方對瓶實水于盥盆質明庖者告饌具主人主婦共詣影堂二執事者舉祠版笥主人前導主婦主婦從後衆丈夫在左衆婦女在右從至祭所置于西階上火爐之西向主人主婦盥手帨手各奉祠版置于其位先考妣後主人帥衆丈夫共為一列長幼以敘立於東階下北向西上主婦帥衆婦女如衆丈夫之敘婦以夫之長幼不以身之長幼立于西階下北向東上執事者立于其後共為一列亦西上位定俱再拜此參神也少牢饋食禮將祭主人朝服即位于阼階東西靣祝告利成主人立于阼階上西靣尸出入主人降立于阼階東西靣此皆主人之正位也卒脀祝盥于洗升自西階主人盥升自阼階祝先入南靣主人從户內西靣祝酌奠主人西靣再拜稽首皆為几筵之在西也尸升筵主人西靣立于户內拜妥尸尸醋主人主人西靣奠爵拜皆為尸之在西也開元禮贊禮者設主人之位于東階下西靣亞獻終獻位于主人東南掌事者位終獻東南俱重行西向北上設子孫之位于庭重行北靣西上設贊唱者位于終獻西南西南享曰參神皆就此位按今民間祠祭必向神位而拜無神在此而西向拜者故此皆北向向神而立及拜脀諸應切醋音胙主人升自阼階立于香卓之南搢笏焚香古之祭者不知神之所在故灌用鬱鬯臭陰逹于淵泉蕭合黍稷臭陽逹于牆屋所以廣求其神也今此禮既難行于士民之家故但焚香酹酒以代之再拜降復位祝及執事者皆盥手帨手執事者一人升開酒拭瓶口實酒于注子取盞斟酒西向酹庖人先用飯床陳饌于盥帨之東衆丈夫盥手帨手主人帥之脫笏奉肉食主人升自阼階衆丈夫升自西階以設次于曽祖考妣祖考妣考妣神座前蔬果之北降執笏復位衆婦女盥手帨手主婦帥之奉麵食升自西階以次設于肉食之北降奉米食升自西階以次設于麵食之北降復位主人升自阼階詣酒注所西向立執事者一人左手奉曽祖考酒盞右手奉曽祖妣酒盞一人奉祖考妣酒盞一人奉考妣酒盞皆如曽祖考妣之次就主人所主人搢笏執注以次斟酒執事者奉之徐行反置故處主人出笏詣曽祖考妣神座前北向執事者一人奉曽祖考酒盞立于主人之左一人奉曽祖妣酒盞立于主人之右主人搢笏跪取曽祖考酒酹之授執事者盞返故處主人出笏俯伏興少退立祝懷辭出主人之左東向搢笏出辭跪讀之曰維年月日孝子曽孫具位某敢用柔毛牲用彘則曰剛鬛嘉薦普淖用薦嵗事于曽祖考某官府君曽祖妣某封某氏配尚饗祝卷辭懷之執笏興主人再拜次詣祖考妣考妣神座皆如曽祖考妣之儀祝辭之異者祖曰孝孫薦嵗事于祖考妣父曰孝子薦嵗事于考妣獻畢祝及主人皆降位次亞獻終獻以主婦或近親為之盥手帨手若已嘗盥手者更不盥升自西階斟酒酹酒皆如上儀惟不讀祝既遍主人升自東階脫笏執注子遍就斟酒盞皆滿執笏退立于香卓東南北向主婦升自西階執匕扱黍中西柄扱初洽切正筯立于香卓西南北向主人再拜主婦四拜少牢饋食禮七飯尸告飽祝西靣于主人之南獨侑不拜侑曰皇尸未實侑勸也又曰尸又食上佐食舉肩尸不飯告飽主人不言拜侑注祝言而不拜主人不言而拜親踈之宜今主人斟酒主婦扱匕正筯而拜亦不言侑食之意也執事者一人執器瀝去茶清一人隨以湯斟之皆自西始畢皆出祝闔門主人立于門東西向衆丈夫在其後主婦立于門西東向衆婦皆在其後特牲饋食曰尸謖注謖起也又曰佐食徹尸薦爼敦設于西北隅几在南厞用筵納一尊佐食闔牖户降注厞隱也不知神之所在或逺諸人乎尸謖而改饌為幽暗所以為厭飫此所謂當室之白為陽厭尸未入之前為陰厭祭義曰祭之日入室僾然必有見乎其位周旋出户肅然必有聞乎其容聲出户而聽愾然必有聞乎歎息之聲鄭曰無尸者闔户若食間此則孝子廣求其親庶或享之忠愛之至也今既無尸故須設此儀若老弱羸疾不能久立則更休他所當留親者一兩人侍立于門外可也謖所六切敦音對厞扶米切僾音愛愾開大切如食間祝升當門外北向告啓門三士虞禮祝聲三啓户注聲者噫㰴也將啓户驚覺神也乃啓門執事者席于玄酒之北主人入就席西向立祝升自西階就曽祖位前搢笏舉酒徐行詣主人之右南向授主人搢笏跪授祭酒啐酒執事者授祝以器祝受器取匕抄諸位之黍各少許置器中祝執黍行詣主人之左北向嘏于主人曰祖考命工祝承致多福于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉壽永年勿替引之主人置酒于席前執笏俯伏興再拜搢笏跪受黍嘗之實于左袂執事者一人立于主人之右主人授執事者器挂袂于手指取酒卒飲執事者一人立于主人之右受盞置酒注旁一人立于主人之左執盤置于地主人寫袂中之黍于盤執事者授以出主人執笏俯伏興立于東階上西向于主人之受黍也祝執笏退立于西階上東向主人既就位祝告利成降復位于是在位者皆再拜主人不拜此受胙也主人降與在位者皆再拜此辭神也主人主婦皆升奉祠版納于櫝笥妣先考後執事者二人舉之導從歸于影堂如來儀主婦還監徹酒盞不酹者及注中餘酒皆入于壺封之所謂福酒執事者徹祭饌返于厨傳于宴器主婦監滌祭器藏之主人監分祭饌為胙盤品取少許同置于合并福酒皆緘之貴于神餘不貴豐腆遣僕執書歸胙于親友之好禮者書辭在後執事者設餕席男女異座主人與衆丈夫坐于堂主婦與衆婦女坐于室設倚卓𬞞果醢醯醬酒盞匕筯畢入酒于注庖者溫祭饌男尊長就坐衆男獻壽若主人主婦之上更有尊長則主人帥衆男主婦帥婦女以獻壽敘立向尊長如祭所之位而男女皆以右為上如尊長南向則以東為上是也衆丈夫以長者或弟或子少進執事者一人執酒注立于右一人執酒盞立于左長男即衆丈夫之長也搢笏跪右手執注左手執盞斟酒祝曰祀事既成祖考嘉饗伏願備膺五福保族宜家執注者退執盞者置酒于尊長之前長男俯伏興退復位與衆丈夫俱再拜興立尊長命執事者取酒注及長男酒盞置于前自斟之祝曰祀事克成五福之慶與汝曹共之執事者以盞致于長男長男搢笏跪受以授執事者置其位俯伏興立尊者命執事者遍斟衆丈夫酒畢長男及衆丈夫皆再拜尊者命坐乃就坐衆女獻女尊長于室女尊長酢衆婦女立斟立授不跪餘皆如衆丈夫之儀飲畢執事者獻肉食畢衆婦女詣堂獻男尊長壽婦女執事不能祝者默斟而已及尊長酢長女或妹或女長女立斟立受不跪婦長則使執事者就酢餘皆如衆丈夫之儀衆丈夫詣室獻女尊長壽如堂上之儀執事者薦麵食衆執事者獻男女尊長壽如婦女而不酢執事者薦米食時候泛行酒間以祭饌盞數惟尊長之命禮祭事既畢兄弟及賔迭相獻酬有無算爵所以因其接會使之交恩定好優勸之今亦取此儀凡歸胙及餕若酒不足則和以他酒饌不足則繼以他饌既罷據所酒饌主人頒胙于外僕主婦頒胙于內執事者遍及微賤其日皆盡孔子祭于公不宿肉不敢留神惠也凡祭主于盡愛敬之誠而已疾則量筯力而行之少壯者自當如儀影堂雜儀主人以下皆盛服男女左右敘立如常儀主人主婦親出祖考置于位焚香主人以下俱再拜執事者斟祖考前茶酒以授主人主人搢笏跪酹茶酒執笏俯伏興帥男女俱再拜次酹祖妣以下皆遍納祠版出徹月望不設食不出祠版餘如朔儀影堂門無事常閉每旦子孫詣影堂前唱喏出外歸亦然出外再宿以上歸則入影堂每位各再拜將逺適及遷官大事則盥手焚香以其事告退各再拜有時新之物則先薦于影堂遇水火盜賊則先救先公遺文次祠版次影然後救家財歸胙于所尊書某惶恐啓今月某日有事于祖考謹遣歸胙于執事伏惟尊慈俯賜容納某惶恐再拜某人執事復書某咨吾子孝享祖考不専有其福施及老夫感慰良深某咨某人平交書某啓今月某日有事于祖考謹遣歸胙伏惟留納某再拜某人左右復書某啓伏承某人孝享祖考不専有其福施及賤交不勝感戢某再拜某人左右降等書某咨今月某日有事于祖考今遣致胙某咨某人復書某惶恐啓伏承某人孝享祖考欲廣其福辱及賤子過蒙恩私不勝感戴之至某惶恐再拜某人執事封皮如常日啓狀儀書儀卷十
