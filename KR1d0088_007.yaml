body:
  text: 書儀卷七宋司馬光撰喪儀三卜宅兆葬日開元禮五品以上卜六品以下筮今若不曉卜筮止用抔珓可也若葬于祖塋則更不卜筮既殯以謀葬事檀弓曰既殯旬而布材與明器今但殯畢則可以謀葬事既擇地得數處孝經曰卜其宅兆而安厝之謂卜地決其吉凶爾非若今陰陽家相其山岡風水也國子高曰葬者藏也又曰死則擇不食之地而葬我焉明無地不可葬也古者天子七月諸侯五月大夫三月士踰月而葬蓋以會葬者逺近有差不得不然也然禮文多云三月而葬蓋舉其中制而言之今五服年月敕王公已下皆三月而葬按春秋己丑葬敬嬴雨不克葬庚寅日中而克葬丁巳葬定公雨不克葬壬午日下吳乃葬何嘗擇年月日時也葬於北方北首何嘗擇地也為其禍福與今不殊世俗信葬師之説既擇年月日時又擇山水形勢以為子孫貧富貴賤賢愚夭夀盡繫於此又葬師所有之書人人異同此以為吉彼以為凶爭論紛紜無時可決其尸柩或寄僧寺或委逺方至有終身不葬或纍世不葬或子孫衰替忘失處所遂棄捐不葬者凡人所貴身後有子孫者正為收藏形骸耳其子孫所為乃如此曷若初無子孫死于道路猶有仁者見而殣之邪耳彼陰陽家謂人所生年月日時足以定終身祿命信如此所言則人之祿命固已定於初生矣豈因殯葬而可改耶是二説者自相矛盾而世俗兩信之其愚惑可謂甚矣使殯葬實能致人禍福為人子者豈忍使其親臭腐暴露不殯葬而自求其利耶悖禮傷義無過於此然孝子之心慮患深逺恐淺則為人所汩深則濕潤速朽故必擇土厚水深之地而葬之所擇必數處者以備卜之不吉故也或曰世人久未葬者非盡以陰陽拘忌之故亦以家貧未能歸葬故也豫應之曰子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂手足形還葬而無槨稱其財斯之謂禮注還猶疾也謂不及其日月又子遊問喪具夫子曰稱家之有亡子遊曰有亡惡乎齊夫子曰有亡過禮苟亡矣里斂手足形還葬懸棺而窆人豈有非之者哉昔亷范千負喪郭原平自賣營墓豈待豐富然後葬其親哉近世河中進士周孟家貧改葬其親騎驢出城一僕荷插隨之取其親之骨掘深坎埋之而歸此雖不及于禮比於不能葬者猶賢矣在禮未葬不變服食粥居倚廬寢苫枕塊蓋閔親之未有所歸故寢食不安奈何捨之出遊食稻衣錦不知其何以為心哉世人又有遊宦沒於逺方子孫火焚其柩收燼歸葬者夫孝子愛親之肌體故斂而葬之殘毁他人之尸在律猶嚴況子孫乃悖謬如此其始蓋出於羌裔之俗浸染世人行之既久習以為常見者恬然曾莫之怪豈不哀哉延陵季子適齊其子死葬於嬴博之間曰骨肉歸于土命也魂氣則無不之也孔子以為合禮必也不能歸葬葬于所在可也不猶愈於焚之哉汩音骨惡音烏齊子細切窆彼斂切執事者掘兆四隅外其壤兆塋域也掘中南其壤為葬將北首故也蒞卜或命筮者擇逺親或賔客為之及祝執事者皆吉冠素服雜記大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨如筮則史練冠長衣以筮占者朝服注曰麻衣至緇布冠非純凶也皮辨則純吉之尤者也長衣練冠純凶服也朝服純吉服也今從簡易依開元禮皆非純吉亦非純凶素服者但徹去華采珠玉之飾而已執事者布卜筮席於兆南北向主人既朝哭適兆所立於席南當中壤北向免首絰左擁之蒞卜筮者立於主人之右北向卜筮者東向執龜策進南靣受命於主人蒞卜者從旁命之曰孤子姓名為父某官為母則稱哀子為母某封度兹幽宅無有後艱度謀也宅居也言謀此以為幽冥之居得無將有艱難謂有非常若崩壞也卜筮者許諾右旋就席北靣坐述命士喪禮不述命既受命而申言之曰述不述者士禮略今從開元禮指中封而卜筮中封中央壤也占既得吉則執龜策東向進告于蒞卜筮者及主人曰從主人絰哭若不從更卜筮他所如初儀兆既得吉執事者于其中壤及四隅各立一標當南門立兩標祝帥執事者入設后土氏神位於中壤之左南向古無此開元禮有之置倚卓盥盆帨架盞注脯醢既不能如此只常食兩三味皆如常日祭神之儀但不用紙錢告者與執事者皆入卜者不入序立於神位東南重行西向北上立定俱再拜告者盥手洗盞斟酒進跪酹于神座前俯伏興少退北向立搢笏執詞進于神座之右東靣跪念之曰維年月朔日子某官姓名敢昭告于后土氏之神今為某官姓名主人也營建宅兆神其保佑俾無後艱謹以清酌酺醢祇薦于神尚饗訖興復位告者再拜出祝及執事者皆西向再拜徹饌出主人歸殯前北靣哭卜筮葬日於三月之初若墓逺則卜筮於未三月之前命曰某月日主人先與賔議定可葬日三日謂可以辦具及于事便者必用三日備不吉也執事者布卜筮席於殯門外闑西北向主人既朝哭與衆主人謂亡者諸子出立於殯門外之東壁下西向南上闔東扉主婦立於其內主人進立於門南乃北向免首絰左擁之蒞卜筮者立主人東北乃西向卜筮者執龜策東向進受命於蒞卜筮者命之曰孤子某將以今月某日先卜逺日不吉再卜近日卜葬其父某官考降無有近悔考上也降下也言卜此日葬魂神上下無得近于咎悔者乎卜筮者許諾右旋就席西向坐述卜筮不吉則又興受命述命再卜占既得吉興告于蒞卜者及主人曰某日從主人絰與衆主人皆哭又使人告于主婦主婦亦哭主人與衆主人入至殯前北向哭遂使人告於親戚僚友應會葬者若孫為祖後則蒞卜筮者命之曰孤孫某卜葬某祖某官夫曰乃夫某卜葬其妻某氏兄弟及他親為喪主者各隨其所稱曰某親某卜葬某某親某官穿壙為窆具謂下棺葬有二法有穿地直下為壙置柩以土實之者有先鑿埏道旁穿土室攛柩於其中者臨時從宜凡穿地宜狹而深壙中宜穿古之葬者有折有抗木有抗席折由屐也方鑿連木為之如床而縮者三橫者五無簀窆事畢加之壙上以承抗席抗木橫三縮二抗禦也所以禦止土者其橫與縮各足橫掩席抗所以禦塵然則古者皆直下為壙而上實以土也今疏土之鄉亦直下為壙或以石或以磚為藏僅令容柩以石蓋之每布土盈尺實躡之稍增至五尺以上然後用杵築之恐土淺震動石藏故也自是布土每尺築之至于地平乃築墳於其上喪葬令葬不得以石為棺槨及石室謂其侈靡如桓司馬者此但以石禦土耳非違令也其堅土之鄉先鑿埏道深若干尺然後旁穿窟室以為壙或以磚範之或但為土室以磚數重塞其門然後築土實其埏道然恐嵗久終不免崩壞不若直下穿壙之為牢實也凡旁穿之壙不宜寬大寬大則崩破尤速當僅令容柩葬時先以竹竿布地稍在壙中置柩于其上而攛之既而抽去其竹其明器下帳五榖牲酒等物皆于埏道旁别穿窟室為便房以貯之其直下穿壙者既實土將半乃于其旁穿便房以貯之穿地狹則役者易上下但且容下柩則可矣深則盜難近鄉里土厚水深太尉嘗有遺命令深葬自是嘗以三丈三尺為準昔晉文公有大功於周襄請隧而王弗許曰王章也然則古者乃天子得為隧道自餘皆懸棺而窆今民間往往為隧道非禮也宜懸棺以窆屐舉綺切閣藏食物之名挽土宜用兩轆轤重物上下宜用革車其制用大木四根交股縛而埋之謂之夜叉木架大木于其上為梁梁須圓直之木夜叉木為月口梁之加于月口者圍徑須同一粗一細則諸絙之轉或長或短而偏矣于梁兩端各設十二輻搭絙於梁一邊其垂絙之地當中央下則使兩人按輻一一縱之上則兩人攀輻而挽之勻而無失勝于鷹架木引索有急緩欹側之患或用鷹架木亦用夜叉木及大木堅而圓滑者為梁然一定無轉以巨絙繫重物繞梁一匝遣數人執其末上則挽下則縱之物尤重則以兩絙交于梁上各遣數人執其末立於埏之兩旁或挽或縱之人上下宜用鞦韆板如常日鞦韆板絙過人頭則合為一以革車或鷹架木挽之縱之而已或用兀子以二絙匱之高于人頭繫其兩端于兀子四腳合兩端于兀子四腳合兩䙡繫二巨絙於其上先以三厚板橫於埏口置兀子於其上交二絙於梁上每絙各使數人執其末立於埏之東西微引兀子令去板旁徹板乃緩緩縱之令下若出則引之令下上復以板承之䙡區貴切下板宜用四紼紼大索也以新麻為之粗如鞦韆索其長比兀子深加倍之每尺以墨畫之及窆以二綍繫柩左鐶樓底結于右鐶二綍繫右鐶亦如之及窆牀以大木為之其制如人家繡牀而仰之廣長出桄于埏口兩旁之桄皆用堅而圓滑之木置窆牀于埏口橫施三板置柩其上左右各三綍繞桄一匝每紼數人執之如下兀子之法擊鼓為節鼓一聲執紼者左右手互縱一尺至底解去綍桄音光或用鷹架木下之亦可也碑志志石刻文云某官姓名婦人云某姓名妻某封某氏某州某縣人考諱某某官某氏某封無官封者但云姓名或某氏某年月日生敘歷官遷涎婦人云年若干適某氏敘因夫子致封邑無官封者皆不敘某年月日終某年月日葬丈夫云娶某氏某人之女封某邑子男某某官女適某官某人若直下穿壙則置之便房若旁穿為壙則置之壙門墓前更立小碑可高二三尺許大書曰某姓名某更不書官古人有大勳德勒銘鍾鼎藏之宗廟其葬則有豐碑以下棺耳秦漢以來始命文士褒贊功德刻之于石亦謂之碑降自南朝復有銘志埋之墓中使其人果大賢耶則名聞光昭衆所稱頌乃流今古不可掩蔽豈待碑志始為人知若其不賢也乃以巧言麗辭強加采飾功侔吕望德比仲尼徒取譏笑其誰肯信碑猶立於墓道人得見之志乃藏于壙中自非開發莫之睹也隋文帝子秦王俊薨府僚請立碑帝曰欲名一卷史書足矣何用碑為徒與人作鎮石耳此實語也今既不能免俗其志文但可直敘鄉里世家官簿始終而已季札墓前有後世稱孔子所篆云嗚呼有吳延陵季子之墓豈在多言然後人知其賢耶今但刻姓名于墓前他日人自知其賢愚耳喪葬令一品墳高一丈八尺每品減二尺六品以下不得過八尺又五品以上立碑螭首龜趺趺上高不得過九尺七品以上立碣圭首方趺趺上高四尺其石獸三品以上六五品以上四又曰諸喪葬不能備禮者貴得同賤賤雖富不得同貴世人好為高墓大碑前列石羊石虎自誇崇貴殊不知葬者當為無窮之規後世見此等物安知其中不多藏金玉耶是皆無益于亡者若能俱不用尤善也漢光武作夀陵裁令陂池流水而已南唐司徒李建勳且死戒家人勿封土立碑聽人耕種其上曰他日免為開發之標及金陵破王公貴人之家無不被發者惟建勳冢莫知其處此皆明哲能深思逺慮者也明器下帳苞筲祠版明器刻木為車馬僕從侍女各執奉養之物象平生而小多少之數依官品既夕禮有明器用器燕器孔子曰之死而致死之不仁而不可為也之死而致生之不智而不可為也注之往也死之生之謂無知與有知也又曰是故竹不成用瓦不成沫木不成斫注成善也沫靧也又曰其曰明器神明之也又曰塗車芻靈自古有之喪葬令五品六品明器許用三十事非升朝官者許用十五事并用器碗楪瓶盂之類通數之沫音末靧音悔下帳為床帳茵席倚卓之類皆象平生所用而小也苞既夕禮苞二注所以裹奠羊豕之肉檀弓曰國君七箇遣車七乘雜記曰遣車視牢具或問曾子曰君子既食則裹其餘乎曾子曰大享既饗卷三牲之爼歸于賔館父母而賔客之所以為哀也晉賀循用腐一篋以代所苞牲體今遣奠既無牲體人生肉經宿則臭敗不若用循禮得事之宜然遣奠之時亦當設脯既奠苞以蒲篋或箱或竹掩耳或席簟之類包之皆可也筲既夕禮筲三黍稷麥今但以竹器或小罌貯五穀各五升可也醯醢罌既夕禮甕三醯醢屑注薑桂之屑也今但以小罌二貯醯醢以桑木為祠版鄭康成以為卿大夫士無神主大夫束帛依神士結茅為藂徐邈以為公羊大夫聞君之喪攝主而往重主道也埋重而立主大夫士有重亦宜有主蔡謨以為今世有祠版乃禮之廟主也主亦有題今版書名號亦是題主之意安昌公荀氏祠制神版皆正長尺一寸博四寸五分厚五寸八分大書某祖考某封之神座夫人某氏之神座書訖蠟油炙令入理刮拭之今士大夫家亦有用祠版者而長及博厚不能盡如荀氏之制題云某官府君之神座某封邑夫人郡縣君某氏之神座續加封贈則先告貼以黃羅而改題無官則題處士府君之神座版下有趺韜之以囊籍之以褥府君夫人只為一匣今從之禮虞主用桑練主用栗祠版主道也故于虞亦用桑將小祥則更以栗木為之啓殯啓殯之日墓近則於葬前一日啓殯墓逺則於發引前一日啓殯夙興執事者縱置席於影堂前階上及聽事中央仍帷其聽事席所以藉柩也帷之為有婦人在焉既夕禮遷于祖用軸注蓋象平生將出必辭尊者檀弓曰喪之朝也順死者之孝心也其哀離其室也故至于祖考之廟而後行殷朝而殯于祖周朝而遂葬開元禮無朝廟禮今從周制又周禮既載而朝于庭今人既載遂行無祖于庭難施哭位故但祖于聽事喪事有進而無退無聽事者但向外之屋可置柩者皆可也備功布長三尺以新布稍細者為之祝御柩執此以指麾役者也五服之親皆來會各服其服入就位哭喪服小記男子冠而婦人笄男子免而婦人髽又曰緦小功虞卒哭則免注棺柩已藏嫌恩輕可以不免也言則免者則既殯先啓之間雖有事不免又曰既葬而不報虞則雖主人皆冠及虞則皆免注有故不得疾虞雖主人皆冠不可久無飾也皆免自主人至緦麻開元禮主人及諸子皆去冠絰以邪巾帕頭按自啓殯至于卒哭日數甚多今已成服若使五服之親皆不冠而袒免恐其驚俗故但各服其服而已執事者遷靈座及椸於旁側為將啓殯祝凶服無服者則去華盛之服執功布止哭者北向立於柩前抗聲三告曰謹以吉辰啓殯既告內外皆哭盡哀止既夕禮喪祝袒免執功布入升自西階盡階不升堂聲三啓三命哭泣功布灰治之布也執之以執神為有拂㧍也聲三三有聲存神也啓三三言啓以告神也舊説以為聲噫興也開元禮祝三聲噫嘻今恐驚俗但用其辭拂芳味切㧍芳丈切婦人退避於他所為役者將入主人及衆主人輯杖立視啓殯喪大記大夫士哭殯則杖哭柩則輯杖注哭殯謂既塗也哭柩謂啓殯後也輯斂也謂舉之不以柱地也天子諸侯之子杖不入公門祝取銘旌置靈座之側役者入徹殯塗及墼掃地潔之祝以功布拂去棺上塵覆以夾衾既夕禮祝取銘置于重今以魂帛代重故置于靈座側役者出婦人出就位立哭執事者復設椸及靈座於故處乃徹宿奠置新奠既夕禮遷於祖正柩於兩楹間席升設于柩西奠設如初注奠設如初東靣也不統于柩神不西靣也不設柩東東非神位也開元禮不朝祖徹殯設席于柩東奠之謂之啓奠如常日朝夕奠之儀朝祖役者入婦人退避主人立視如啓殯役者舉柩詣影堂前祝以箱奉魂帛在前執事者奉奠及倚卓涎之銘旌次之柩次之未明則柩前後皆用二燭照之主人以下皆從哭男子由右婦人由左重服在前輕服在後各以昭穆長幼為敘侍者在末無服之親男居男之右女居女之左不與主人主婦並行婦人皆蓋頭為有役者在前故也役者出則出蓋頭至影堂前置柩於席北首役者出祝帥執事者設靈座及奠于柩西東向若影堂前迫隘則置靈座及奠于旁近從地之宜主人以下就位位在柩之左右前後如在殯宫立哭盡哀止役者入婦人退避祝奉魂帛導柩右旋主人以下哭從如前詣聽事置席上南首設靈座及奠於柩前南向餘如朝祖主人以下就位坐于柩側藉以薦席如在殯宫乃代哭如未殯之前親賔奠世俗謂之祭賻贈賔客欲致奠于其家者以飯牀設茶果酒饌于其庭暑則覆之以幄將命者入白主人主人絰杖降自西階待於阼階下西向賔入家人皆哭賔敘立于饌南北向東上置卓子于賔北炷香澆茶實酒於注洗盞斟酒於其上上賔進燒香退復位與衆賔皆再拜上賔進跪酹茶酒俯伏興賔祝執祝辭出於上賔之右西向讀之曰維年月日某官某謹以清酌庶羞致祭於某官之靈中間辭臨時請文士為之尚饗祝興凡吉祭祝出於左東向凶祭出於右西向賔再拜應哭者哭進詣主人前東向北上上賔止主人哭主人稽顙再拜賔答拜主人哭而入護喪延賔坐于他所茶湯送出如常儀祝納酒饌及祝辭於喪家若奠于輿所經過者設酒饌于道左右或有幄或無幄附令敕諸喪葬之家只許祭于塋所不得于街衢致祭然親賔祭于喪家大門之內及郭門之外亦非街衢也望柩將至賔燒香酹茶酒祝拜哭柩至少駐主人詣奠所拜賔哭從柩而行餘如上儀奠于墓所皆如在其家之儀既夕禮儐者出請若奠入告出以賔入將命如初士受羊如受馬然則古者但致奠具而已漢氏以來必設酒食沃酹徐稚每為諸公所辟雖不就有死喪負笈赴弔常于家豫炙雞一隻以一兩綿絮漬酒中暴乾以裹雞徑到所赴冢隧外以水漬絮使有酒氣汁米飯白茅為籍以雞置前醊酒畢留謁則去不見喪主然則奠貴哀誠酒食不必豐腆也自唐室中葉藩鎮強盛不遵法度競其侈靡始縛祭幄至高數丈廣數十步作鳥獸花木輿馬僕從侍女衣以繒綺轜車過則盡焚之祭食至百餘品染以紅緑實不可食流及民間遞相誇尚有費錢數百緍者曷若留以遺喪家為賻贈哉其親賔賻贈皆如始死之儀而不禭士喪禮始死有弔有襚將葬有賵有奠有賻贈知死者贈知生者賻賻贈皆用財貨但將命之辭異耳春秋傳譏贈死不及尸尸謂未葬時也然則自始死至葬賻贈之禮皆可行也書儀卷七
