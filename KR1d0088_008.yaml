body:
  text: 書儀卷八宋司馬光撰陳器轝夫陳器於門外方相在前喪葬令四品以上用方相七品以上用魌頭方相四目魌頭兩目載以車魌音欺次誌石次椁二物已在墓所則不陳次明器次下帳次上服有官則公服靴笏無官則襴衫皆有幞頭腰帶次苞但陳所用之苞其脯俟遣奠畢始苞之次筲次醯醢次酒一斗盛以瓶以上並以小牀舁舉之次銘旌去跗使人執之入壙則去杠覆于柩上次靈舁葬日置魂帛于上炷香其前藏祠版于箱篋置其後返則祠版于前藏魂帛于箱篋亦以小舁牀舉之開元禮靈輿在方相前今置柩前次大轝載柩者也宜用輕堅木為格僅能容柩上施鱉甲盖轝竿則宜強壯多用新絙纒束巨絙數道撮角樓底縛于竿上則可保無虞喪大記飾棺君龍帷三池振容黼荒火三列黼黻三列素錦褚加帷荒纁戴六纁披六大夫士以是為差注飾棺者以華道路及壙中不欲衆惡其親也荒蒙也在旁曰帷在上曰荒黼荒緣邊為黼文火黻為列于其中爾禇以襯覆棺乃加帷荒于其上紐所以結連帷荒者也池竹為之如小車苓衣以青布栁象宫室縣池于荒之𤓰端若承霤然云君大夫以銅魚縣于池下齊象車盖蕤縫合雜采為之形如𤓰分然綴貝絡其上及旁戴之言值也所以連繫棺束與栁材使相值因而結前後披也正義振動也以絞繒為之長丈餘如幡畫幡上為雉縣于池下為容飾車行則幡動故曰振容齊者謂鱉甲上當中央形圓如車盖髙三尺徑二尺五貝者連貝為五行交絡齊上魚在振容問此等制度今既難備略設帷荒花頭等不必繁華髙大若柩逺行則多以柿單覆籍轝之上下四旁以禦雨濕繞以畫布帷龍虎轝更無它飾今世俗信轝夫之言多以大木為轝務髙盛大其華飾至不能出入大門紙為幡花繽紛塞路徒欲誇示觀者殊不知轝重大門多觸礙難進退遇峻隘有傾覆彼轝夫但欲用人多取厚直豈顧喪家之利害耶大轝旁有翣貴賤有數開元禮一品引四披六鐸左右各八黼翣二黼翣二畫翣二二品三品引二披四鐸左右各六黻翣二畫翣二四品五品引二披二鐸左右各四黼翣二畫翣二六品以下引二披二鐸畫翣各二凡引者挽轜車索也披者繋于旁執之以備傾覆也鐸所以節挽者翣以木為筐廣二尺髙二尺四寸其形方兩角髙衣以白布柄長五尺黼翣黻翣畫黼黻文于翣之内緣畫以雲氣畫翣者内外四縁皆畫雲氣庶人皆無之喪葬令三品以上六翣挽歌六行三十六人四品至九品各有差按今人不以車載柩而用轝則引披無所施矣轝夫聚衆乃為行止之節多用鉦鼔可以代鐸禮望柩不歌里有殯不巷歌豈可身挽柩車而更歌乎况又歌者復非挽柩之人也此謂葬日行器之叙若柩自他所歸鄉里則銘旌靈轝龍虎轝之外皆不用也祖奠執事者具祖奠酒饌如殷奠其日餔時禮祖用日昊謂日過中時今宜比夕奠差早用餔時可也主人以下卑㓜皆立哭祝帥執事者設酒饌于靈前祝奠訖退北靣跪告曰永遷之禮靈辰不留謹奉柩車式遵祖道俛伏興餘如朝夕奠儀主人以下復位坐代哭以至於發引遣奠厥明執事者具遣奠亦如殷奠轝夫納大轝于聴事前中庭執事者徹祖奠祝奉遷靈座置旁側祝北靣告曰今遷柩就輿敢告婦人避退召轝夫遷柩乃載載謂升柩于轝也以新絙左右束柩于轝乃以横木楔柩足兩旁使不動摇男子從柩哭降視載婦人猶哭于帷中載畢祝帥執事遷靈座于柩前南向乃設遣奠惟婦人不在餘如朝夕奠之儀執事者徹所奠之脯置舁牀上史執賻贈歴立於柩左當肩西向祝在史右南向哭者相止跪讀􅉠贈歴畢與祝皆退既夕禮書賵于方注方版也又曰主人之史請讀賵執算從柩東當前東西面立命毋哭哭者相止也惟主人主婦哭祝在右南面讀書釋算則坐注必釋算者榮其多執事者徹遣奠若柩自他所將歸葬鄉里則但設酒果或脯醢朝哭而行至葬日之朝乃行遣奠及讀賻禮祝奉魂帛升靈舁焚香既夕禮祖還車不還器祝取銘置于茵二人還重左還厥明奠者出甸人抗重出自道道左倚之既葬還埋重于所倚之處開元禮將行祝以腰輿詣靈座前昭告少頃腰輿出詣靈車後少頃輿退掌事者先于宿所張吉凶二帷凶帷在西吉帷在東南向設靈座于吉帷下至宿處進酒脯之奠于柩東又進常食于靈座厥明又進朝奠然後行今兼取二禮婦人盖頭出帷降階立哭有守家不送葬者哭于柩前盡哀而歸卑㓜則再拜辭在塗柩行自方相等皆前導主人以下男女哭歩從如從柩朝祖之叙出門以白幕夾鄣之尊長乗車馬在其後無服之親又在其後賔客又在其後皆乘車馬無服之親及賔客或先待于墓及祭所出郭不送至墓者皆辭于柩前卑㓜亦乘車馬若郭門逺則歩從三里所可乘車馬塗中遇哀則哭無常凖若墓逺經宿以上則每舍設靈座于柩前設酒果脯醢為夕哭之奠夜必有親戚宿其旁守衛之明旦將行朝奠亦如之館舍廹隘則設靈座于柩之旁側隨地之宜及墓掌事者先張靈幄于墓道西設倚卓又設親戚賔客之次男女各異又于羨道之西設婦人幄蔽以簾帷柩將及墓親戚皆下車馬歩進靈帷前祝奉祠版箱及魂帛置倚上設酒果脯醢之奠于其前巾之大轝至墓道轝夫下柩舉之趣壙主人以下哭歩從掌事者設席于羨道南轝夫置柩于席上北乃退掌事者陳明器下帳上服苞筲醯醢酒用飯牀于壙東南北上銘旌施于柩上賔客送至墓者皆拜辭先歸至是上下可以具食既食而窆主人拜賔客賔客荅拜下棺主人及諸丈夫立于埏道東西向主婦及諸婦人立于埏道西幄内東向皆北上以服之重輕及尊卑長㓜為叙立哭轝夫束棺乃窆諸子輟哭視窆既窆掌事者置上服銘旌于柩上慎勿以金玉珍玩入壙中為亡者之累主人贈用制幣𤣥纁束置柩旁再拜稽顙在位者皆哭盡哀既夕禮注丈八尺曰制二制合之束十制五合䟽𤣥纁之率𤣥居三纁居二或家貧不能備𤣥纁束則隨家所有之帛為贈幣雖一制可也匠以塼塞壙門在位者皆還次掌事者設誌石藏明器下帳苞筲醯醢酒于便房以版塞其門遂寔土親戚一人監視之至于成墳祭后土既夕禮無之檀弓曰冇司以几筵舍奠于墓左注為父母形體在此禮其神也今從開元禮掌事者先于墓左除地為祭所置倚卓祭具等既塞壙門告者吉服亦擇親賔為之與祝及執事者俱入行事惟改祝辭某官姓名營建宅兆為某官封諡亡者也窆兹幽宅餘皆如初卜宅兆祭后土之儀題虞主執事者置卓子設香爐酒盞注于靈座前置盥盆帨巾于靈座西南又置卓子于靈座東南西向設筆硯墨于其上主人立于靈座前北向祝盥手出祠版卧置硯卓子上藉以褥使善書者西向立題之祝奉祠版立置靈座魂帛前籍以褥祝炷香斟酒酹之訖執辭跪于靈座東南西向讀之曰孤子某妣日哀子敢昭告于先考某官妣曰先妣某封形歸窀穸神返室堂虞主既成伏惟尊靈舍舊從新是憑是依懷辭興復位主人再拜哭盡哀止祝藏魂帛于箱篋靈舁上乃奉祠版韜藉匣之置其前炷香執事者徹靈座遂行反哭靈舁發行親戚以叙從哭如來儀出墓門尊長乗車馬去墓百歩許卑㓜亦乗車馬徐行勿疾驅既夕禮卒窆而歸不驅注孝子往如慕返如疑為親之在彼哀至則哭及家望門俱哭掌事者先設靈座于殯宫靈舁至祝奉祠版置匣前藉以褥主人以下及門下車馬哭入至聴事主人升自西階丈夫從升如柩在聴事之位立哭盡哀止既夕禮反哭入升自西階東靣衆主人堂下東靣北上注西階東靣反諸其所作也反哭者于其祖廟不于阼階西靣西方神位又曰婦人入丈夫踊升自阼階注辟主人也又曰主婦入于室踊出即位及丈夫拾踊三注于室反諸其所養也出即位堂上西靣也拾更也古今堂室異制又祖載不在廟中故但反哭于聴事如昨日柩在聴事之位反諸其所作也婦人先入立哭于堂如在殯之位盡哀止亦反諸其所養也執事者徹簾帷婦人已入故也賔客有弔者此謂不弔于墓所者檀弓曰反哭之弔也哀之至也反而亡焉失之矣于是為甚殷既封而弔周反哭而弔孔子從周賔客有親密者既窆先歸待反哭而弔主人拜之賔客答拜主人入詣靈座與親戚皆立哭如在殯之位盡哀止開元禮主人以下到第從靈輿入即哭于靈座今從既夕禮宗族小功以下可以歸大功異居者亦可以歸虞祭虞安也骨肉歸于土魂氣無所不之孝子為其彷徨三祭以安之雜記士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭士三虞大夫五諸侯七今五服年月勑自王公以下皆三月而葬三虞而卒哭柩既入壙掌事者先歸具虞饌如朔奠是日虞檀弓曰日中而虞葬日虞弗忍一日離也注弗忍無所歸矣或墓逺不能及日中但不出葬日皆可也主人以下皆沐浴或已晚不暇沐浴但略自澡潔可也執事者設盥盆帨巾各二于西階西南東上帨手巾也東盆有臺帨巾有架在盆北主人以下親戚所盥也其西無臺架執事者所盥也設酒一瓶于靈座東南置開酒刀子拭布于旁旁置卓子上設注子及盞一别置卓子于靈座前設蔬果匕筯茶酒盞醬楪香爐主人及諸子倚杖于堂門外與有服之親皆入尊長坐哭如反哭位卑㓜立哭于靈座前斬衰為一列最在前齊衰以下以次各為一列無服之親又為一列丈夫處左西上婦人處右東上各以昭穆長㓜為叙皆北向婢妾在婦人之後項之祝止哭者主人降自西階盥手帨手詣靈座前焚香再拜退復位及執事者皆盥手帨手執事者一人升開酒拭瓶口實酒于注取盞斟酒西向酹之祝帥餘執事者奉饌設于靈座前主人進詣酒注所北向執事者一人取靈座前酒盞立于主人之左主人左執盞右執注斟酒授執事者置靈座前主人進詣靈座前執事者取酒盞授主人主人跪酹執事者受盞俛伏興少退立祝執辭出主人之右西向跪讀之曰維年月日朔日孤子孫曰孤孫為母及祖母稱哀子哀孫某敢昭告于先考某官祖考同妣則曰某封某氏日月不居奄及初虞夙興夜處哀慕不寧謹以㓗牲柔毛豕曰剛鬛嘉薦普淖明齊溲酒哀薦祫事尚饗士虞禮始虞用柔日葬用丁亥是柔日開元禮間日再虞然則古人葬皆用柔日乎今不拘剛柔葬日即虞後遇剛日即再虞不須間日也士虞禮祝曰哀子某哀顯相夙興夜處不寧敢用㓗牲剛鬛嘉薦普淖明齊溲酒哀薦祫事適爾皇祖某甫饗注喪祭稱哀顯相助祭名也顯明也相助也不寧悲思不安嘉薦菹醢也普淖黍稷也明齊新水也言以新水溲釀此酒也始虞謂之祫事者主欲其祫先祖也以與先祖合為安皇君也某甫皇祖字也饗勸強之也今㕘用開元禮祝詞淖女孝切齊才計切溲所求切祝興主人哭再拜退復位哭止主婦亞獻親戚一人或男或女終獻不焚香不讀祝婦人不跪既酹四拜此其異于丈夫餘皆如初獻之儀士虞禮主人洗廢爵酌酳尸注爵無足曰廢爵酳安食也又曰主婦洗足爵酌亞獻尸賔長洗繶爵三獻注繶爵口足之間有瑑文彌飾開元禮止有主人一獻今從古酳音𦙍繶於力切畢執事者别斟酒滿瀝去茶清以湯斟之主人以下皆出祝闔門主人立于門左卑㓜丈夫在其後主婦立于門右卑㓜婦人在其後皆東向尊長休于他所卑㓜亦可更代休于他所常留一二人在門左右如食間祝立于門外北向告啓門三乃啓門主人以下皆入就位祝立于主人之右西向告利成斂祠版韜藉匣之置靈座主人以下皆哭應拜者再拜盡哀止出就次執事者徹饌士虞禮祝反入徹設于西北隅如其設也几在南厞用席注改設饌者不知鬼神之節改設之庻幾歆饗所以為厭飫也厞隠也于厞隠之處從其幽闇又曰贊閻牖户注鬼神常居幽闇或者逺人乎贊佐食者又曰無尸則禮及薦饌皆如初主人哭出復位祝闔牖户如食間祝升止哭聲三啓户注聲噫㰴也將啓户驚覺神也又曰祝出户西靣告利成皆哭注利猶養也成畢也言養禮畢也厞扶未切祝取魂帛帥執事者埋于屏處絜地既夕禮甸人抗重出自道之左倚之雜記重既虞而埋之注所倚處埋之今魂帛以代重故虞有主亦埋之遇柔日再虞質明祝出祠版置靈座主人以下行禮改祝詞云奄及再虞哀薦虞事餘皆如初虞之儀士虞禮再虞用柔日三虞卒哭用剛日注丁日葬則已日再虞庚日三虞壬日卒哭葬用丁亥是柔日然則古人皆用柔日邪今葬日既不拘剛柔日但于葬日即虞後遇柔日再虞又遇剛日即卒哭三虞又遇剛日即甲丙戊庚壬為剛日乙丁巳辛癸為柔日遇剛日三虞改祝詞云奄及三虞又云哀薦成事餘如再虞卒哭三虞後遇剛日設卒哭祭其日夙興執事者具饌如時祭陳之于盥帨之東用卓子蔬果各五品膾今紅生炙今炙肉羮今炒肉殽今骨頭軒今白肉脯今乾脯醢今肉醬庶羞謂豕羊及其他異味麵食如薄餅油餅和餅蒸餅棗餻環餅捻頭餺飥米食謂黍稷稻梁粟所謂飯及粢餻團粽之類共不過十五品若家貧或鄉土異宜或一時所無不能辦此則各隨所有蔬果肉麵米食不拘數品可也器用平日飲食器雖有金銀無用設𤣥酒一瓶以井花水充之于酒瓶之西主人既焚香帥衆丈夫降自西階衆丈夫盥手帨手以次奉肉食升設靈座前蔬果之北主婦帥衆婦女降自西階盥手帨手以次奉麵食米食設于肉食之北主人既初獻祝出主人之左東向跪讀祝詞改虞祭祝詞云奄及卒哭又云哀薦成事來日躋祔于祖考某官妣云祖妣某封某氏既啓門祝立于西階上東向告利成餘皆如三虞之儀既夕禮始虞之下云猶朝夕哭不奠三虞卒哭注卒哭三虞之後祭名始朝夕之間哀至則哭至此祭止也朝夕哭而已檀弓曰是日也以虞易奠然則既虞斯不奠矣今人或有猶朝夕饋食者各從其家法至小祥止朝夕哭惟朔望未除服者饋食㑹哭大祥而外無哭者禫而内無哭者檀弓又曰卒哭曰成事是日也以吉祭易喪祭如讀祝于主人之左之類是漸之吉祭也祔檀弓曰商人練而祔周卒哭而祔孔子善商注期而神之人情開元禮既禫而祔按士虞禮始虞祝詞云適爾皇祖某甫告之以適皇祖所以安之故置于此卒哭之來日祔于曽祖考此則祔于曽祖喪服小記曰士大夫不得祔于諸侯祔于諸祖父之為士大夫者其妻祔于諸祖姑妾祔于妾祖姑亡則中一以上而祔之必以其昭穆注中謂中間也曽祖考曽祖姑皆以主人言之内外夙興掌事者具饌三分妣則具饌二分雜記曰男子祔于王父則配女子祔于王母則不配注謂若祭王母不配則不祭王父也有事于尊者可以及卑有事于卑者不敢援尊祭饌如一祝詞異不言以某妃配某氏耳如時祭設曽祖考妣坐于影堂南向影堂窄則設坐于他所妣則但設祖妣坐設死者坐于其東南西向各有倚卓設盥盆帨巾于西階下設承版卓子于西方火爐湯缾火筯在其東其日夙興設𤣥酒酒缾盞注卓子于東方設香卓于中央置香爐炷香于其上質明主人以下各服其服哭于靈座前奉曽祖考妣祠版匣置承祠版卓子上出祠版置于坐藉以褥次詣靈座奉祠版匣詣影堂主人以下哭從如從柩之叙至影堂前止哭祝奉祠版置于坐藉以褥主人及諸子倚杖于階下與有服之親尊長卑㓜皆立于庭曽祖考妣在焉故尊長不敢坐前無庭則立于曽祖考位前以服重輕為列丈夫處左西上婦人處右東上左右皆據曽祖考妣言之各以昭穆長㓜為叙皆北向婢妾在婦人之後位定俱再拜㕘曾祖考妣其進饌先詣曽祖考妣前設之次詣亡者前設之主人先詣曽祖考妣前北向跪酹酒俛伏興少退立祝奉辭出主人之左東向跪讀曰惟某年月日子曽孫某敢以柔毛嘉薦普淖明齊溲酒適于曽祖考某官不言以某封某氏配若妣祔于祖妣則云適于祖妣某封氏隮祔孫某官妣云隮祔孫婦某封某氏尚饗祝興主人再拜不哭次詣亡者前東向跪酹酒俛伏興少退立祝讀曰惟年月日孝子某敢用柔毛嘉薦普淖明齊溲酒哀薦祔事于先考某官妣云先妣某封適祖考某官尚饗祝興降位主人再拜不哭降復位亞獻終獻皆如主人儀惟不讀祝祝闔門主人以下出侍立于門左右不哭如食間祝告啓門三及啓門主人以下各就位祝東向告利成主人以下不哭皆再拜辭神祝先納曽祖考妣祠版于匣奉置故處次納亡者祠版于匣奉之還靈座主人以下哭從如來儀至靈座置之哭盡哀止書儀卷八
