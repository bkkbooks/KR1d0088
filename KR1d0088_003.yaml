body:
  text: 書儀卷三宋司馬光撰㛰儀上男子年十六至三十女子十四至二十古禮男三十而娶女二十而嫁按家語孔子十九娶於宋之亓官氏一嵗而生伯魚伯魚年五十先孔子卒然則古人之娶未必皆三十也禮蓋言其極至者謂男不過三十女不過二十耳過此則為失時矣今令文凡男年十五女年十三以上並聽㛰嫁蓋以世俗早㛰之弊不可猝革又或孤弱無人可依故順人情立此制使不麗於刑耳若欲參古今之道酌禮令之中順夭地之理合人情之宜則若此之說當矣身及主㛰者無期以上喪皆可成㛰士昏禮請期之辭惟是三族之不虞三族謂父已于之昆弟是期服皆不可以㛰也雜記曰大功之末可以嫁子然則大功未葬亦不可以主昏也今依律文以從簡易必先使媒氏往來通言俟女氏許之然後遣使者納采使者擇家之子弟為之凡議婚姻當先察其壻與婦之性行及家法何如勿苟慕其富貴壻苟賢矣今雖貧賤安知異時不富貴乎苟為不肖今雖富盛安知異時不貧賤乎孔子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之彼行能必有過人者故邦有道不廢也寡言而慎事故邦無道免於刑戮也擇壻之道莫善於是矣婦者家之所由盛衰也苟慕一時之富貴而娶之彼挾其富貴鮮有不輕其夫而傲其舅姑養成驕妬之性異日為患庸有極乎借使因婦財以致富依婦勢以取貴苟有丈夫之志氣者能無愧乎又世俗好於襁褓童幼之時輕許為㛰亦有指腹為㛰者及其既長或不肖無賴或身有惡疾或家貧凍饌或喪服相仍或從宦逺方遂至弃信負約速獄致訟者多矣是以先祖太尉嘗曰吾之男女必俟既長然後議婚婚既通書不數月必成婚故終身無此悔乃子孫所當法也納采納其采擇之禮前一日主人謂壻之祖父若父也如無則以即日男家長為之女家主人准此以香酒脯醢無脯醢者止用食一二味可也先告於影堂主人北向立焚香酹酒俯伏興立祝懷辭祝以家之子弟為之後准此辭為寫祝文於紙由主人之左進東向搢笏出辭跪讀之曰某壻父名之子某壻名敢告祝興主人再拜出撤闔影堂門乃命使者如女氏士婚禮無先告廟之文而六禮皆行之於禰廟春秋傳鄭忽先配而後祖陳針子曰是不為夫婦誣其祖矣楚公子圍娶于鄭曰圍布几筵告于莊共之廟而來然則古之婚姻皆先告于祖禰也夫婚姻家之大事其義不可不告女家主人亦告于祖彌曰某之女某將嫁于某氏如壻父之儀其日日出婚禮自請期以上皆用昕日出時也使者盛服執生鴈左首飾以繢用鴈為贄者取其順隂陽往來之義若無生鴈則刻本為之飾以繢謂以生色繒交絡縛之止于女氏之門外門者入告女家主人盛服出迎揖讓入門揖讓升堂主人立阼階上西向賔立西階上稍北東向士婚禮賔升西階當阿東靣注云阿棟也入堂深示親親今之室堂必不合禮故稍北而已賔曰吾子有惠貺室某壻名也某壻父名有先人之禮使某使者名請納采主人對曰某女父名之子妹姪孫惟其所當蠢愚又弗能教吾子命之某不敢辭儀禮先使擯往來傳命别有致命之辭今從簡北向再拜此敬壻父之命非拜賔也賔避席立不答拜奉使不敢與尊長抗禮主人賔皆進就兩楹間並立南向賔授鴈主人受之以授執事者乃交授書書者别書納采問名之辭於紙後繫年月日婚主官位姓名止賔主各懷之既授鴈因交相授書壻家書藏女家女家書藏壻家以代今之世俗行禮書納于懷退各以授執事者賔降出門東向立問名主人降階立俟于門內之東西向使擯者出請事擯者主人擇子弟為之賔曰請問名擯者入告主人出延賔賔執鴈復入門與主人揖讓升堂復前位賔曰某使者名既受命將加諸卜敢問女為誰氏對曰吾子有命且以備數而擇之某不敢辭女子第幾賔授鴈交授書降出主人立于門內如初擯者出延賔曰請醴從者對曰某既得將事矣敢辭主人曰敢固以請賔曰某辭不得命敢不從遂入與主人揖讓拜起使者舊拜主人于此方叙私禮飲酒三行或設食以退如常儀納吉歸卜得吉兆復使使者往告婚姻之事于是定計納采之前已卜矣于此告女家以成六禮也納吉用鴈賔曰吾子有貺命某壻父名加諸卜占曰吉使某使者名也敢告主人對曰某女父名之子不教惟恐弗堪子有吉我與在某女父名不敢辭餘如納采禮納幣士婚禮納徴𤣥纁束帛儷皮如納吉禮注徴成也使者納幣以成婚禮用𤣥纁者象隂陽備也束帛十端儷兩也執束帛以致命兩皮為庭實皮鹿皮納幣用雜色繒五匹為束纁既染為𤣥纁則不堪他用且恐貧家不能辦故但雜色繒五匹卷其兩端合為一束而已兩鹿皮使者執束帛執事者二人執皮反之令文在內左手執前兩足右手執後兩足隨賔入門及庭三分之一而止北向西上賔與主人揖讓升堂賔曰吾子有嘉命貺室某使者名也請納幣主人對曰吾子順先典貺某女父名重禮某不敢辭敢不承命于賔之致命也執皮者釋外足復之令文在外於主人之受幣也主人之執事者二人自東來出於執皮者之後受皮於執皮者之左逆從東出餘如納吉禮請期夫家卜得吉日使使者往告之請期用鴈賔曰吾子有賜命某壻夫名既申受命矣使某使者名也請吉日主人曰某既前受命矣惟命是聽賔曰某壻父名命某使者名聽命于吾子主人曰某固惟命是聽賔曰某使某受命吾子不許某敢不告期曰某日主人曰某敢不謹須餘如納幣禮親迎前期一日女氏使人張陳其壻之室俗謂之鋪房古雖無之然今世俗所用不可廢也牀榻薦席椅桌之類壻家當具之氊褥帳幔衾綯之類女家當具之所張陳者但氊褥帪幔帷幕之類應用之物其衣服襪履等不用者皆鎖之篋笥世俗盡陳之欲矜誇富多此乃婢妾小人之態不足為也文中子曰昏娶而諭財鄙俗之道也夫婚姻者所以合二姓之好上以事宗廟下以繼後世也今世俗之貪鄙者將娶婦先問資裝之厚薄將嫁女先問聘財之多少至于立契約云某物若干某物若干以求售某女者亦有既嫁而復欺紿負約者是乃駔儈鬻奴賣婢之法豈得謂之士大夫婚姻哉其舅姑既被欺紿則殘虐其婦以攄其怒由是愛其女者務厚資裝以悅其舅姑殊不知彼貪鄙之人不可盈厭資裝既竭則安用汝力哉于是質其女以責貨于女氏貨有盡而責無窮故婚姻之家往往終為仇讎矣是以世俗生男則喜生女則戚至有不舉其女者因此故也然則議㛰姻有及於財者皆勿與為㛰姻可也綯音陶駔祖朗切儈工外切及期壻具盛饌古者同牢而食必殺牲開元禮一品以下用少牢六品以下用特牲恐非貧家所便故止具盛饌而已設盥盆二於阼階東南皆有巾盥盆中央有勺設倚桌各二於室中東西相向各置杯匕箸蔬果於桌子上罩之士婚禮媵布席于奧夫婦入于室即席婦尊西南靣既設饌御布對席今室堂之制異于古故但東西向而已古者命士以上父子皆異宫故各有堂室奧阼今則不然子舍隘狹或東西北向皆不可知今假設南向之室而言之左為東右為西前為南後為北酒壺在東席之後墉下置合卺一注於其南桌子上卺以匏剖而為二音謹又設酒壺於室外亦一注有杯此所以飲從者也室外隘則于側近别室置之其杯數為時量人之多少也又設酒壺杯注於堂上初婚壻盛服世俗新壻盛戴花勝擁蔽其首殊失丈夫之容體必不得已且隨俗戴花一兩枝勝一兩枚可也主人亦盛服坐于堂之東序西向設壻席于其西北南向壻升自西階立于席西南向贊者兩家各擇親戚婦人習于禮者為之凡壻及婦行禮皆贊者相導之取杯斟酒執之詣壻席前北向立壻再拜升席南向受杯跪祭酒興就席末坐啐酒興降西授贊者杯又再拜此所謂醮也進詣父座前東向跪父命之曰往迎爾相承我宗事勉率以謹若則有常祖父在則祖父命之也子曰諾惟恐弗堪不敢忘命俯伏興再拜出乘馬至于女氏之門外下馬俟于次女家必先設壻次于外女家亦設酒壺杯注於堂上於壻之將至女盛飾姆相其禮姆音茂以乳母或老女僕為之奉女立于室户外南靣姆在其右從者在後父坐于東序西向母坐于西序東向祖父母在則祖父母醮而命之設婦席于母之東北南向贊者醮以酒如壻父醮子之儀姆導女出於母左父少進命之曰戒之謹之夙夜無違爾舅姑之命母送女至于西階上為之整冠斂帔命之曰勉之謹之夙夜無違爾閨門之禮諸母姑嫂姊送于中門之內為之整裙衫申以父母之命曰謹聽爾父母之言夙夜無愆父既醮女即先出迎壻于門外揖讓以入壻執鴈以從至于㕔事主人升自阼階立西向壻升自西階北向跪置鴈于地主人侍者受之壻俯伏興再拜主人不答拜姆奉女出于中門壻揖之降自西階以出婦從後主人不降送壻至婦氊車後之右舉簾以俟姆辭曰未教不足與為禮也士婚禮壻御婦車授綏姆辭不受注壻御者親而下之綏所以引升車者僕人之禮必授人綏今車無綏故舉簾以代之壻乃自車右由車前過立于左轅側姆奉婦登車下簾壻右執䇿左撫轅行驅車輪三周止車以俟今婦人幸有氊車可乘而世俗重檐子輕氊車借使親迎時暫乘氊車庸何傷哉然人亦有性不能乘車乘之即嘔吐者如此則自乘檐子其御輪三周之禮更無所施姆亦無所用矣壻乘馬在前婦車在後亦以二燭前導男率女女從男夫婦剛柔之義自此始也壻先至㕔事婦下車揖之遂導以入婦從之執事先設香酒脯醢於影堂無脯醢量具殽羞一兩味舅姑盛服立於影堂之上舅在東姑在西相向贊者導壻與婦至于階下北向東上無階則立于影堂前主人進北向立焚香跪酹酒俯伏興立祝懷辭由主人之左進東靣搢笏出辭跪讀之曰某壻名以令月吉日迎婦某婦姓婚事見祖彌祝懷辭出笏興主人再拜退復位壻與婦拜如常儀出撤闔影堂前古無此禮今謂之拜先靈亦不可廢也贊者導壻揖婦而先婦從之適其室壻立于南盥之西婦立于北盥之西皆東向婦從者沃壻盥于南壻從者沃婦盥于北從者各以其家之女僕為之前准此帨巾畢揖而行升自西階士婚禮及寢門揖入升自西階媵御沃盥交注媵送也謂女從者也御音訝御迎也謂壻從者也媵沃壻盥于南洗御沃婦盥于北洗夫婦始接情有亷恥媵御交導其志按洗在阼階東南既升階不云降階何由復至洗所故今先盥而升階婦從者布席于閫內東方壻從者布席于西方壻婦踰閫壻立于東席婦立于西席婦拜壻答拜古者婦人與丈夫為禮則俠拜鄉里舊俗男女相拜女子先一拜男子拜女一拜女子又一拜蓋由男子以再拜為禮女子以四拜為禮故也古無壻婦交拜之儀今世俗始相見交拜拜致恭亦事理之宜不可廢也俠音夾壻揖婦就坐壻東婦西古者同牢之禮壻在西東靣婦在東西靣蓋古人尚右故壻在西尊之也今人既尚左且須從俗壻從者徹羃置饌壻婦皆先祭後食食畢壻從者啓壺入酒于注斟酒壻揖婦祭酒舉飲置酒舉殽殽者乃今之下酒也又斟酒舉飲不祭無殽又取卺分置壻婦之前斟酒舉飲不祭無殽壻出就他室姆與婦留室中乃徹饌置室外設席壻從者餕婦之餘婦從者餕壻之餘壻復入室脫服婦從者受之婦脫服壻從者受之燭出古詩云結髮為夫婦言自稚齒始結髮以來即為夫婦猶李廣云廣結髮與胸奴戰也今世俗有結髮之儀此尤可笑於壻婦之適其室也主人以酒饌禮男賔於外㕔主婦以酒饌禮女賔于中堂如常儀古禮明日舅姑乃享送者今從俗不用樂曽子問曰取婦之家三日不舉樂思嗣親也今俗婚禮用樂殊為非禮書儀卷三
